// ==================== APP CONFIG ====================
const APP_ENV = (location.hostname === 'localhost' || location.protocol === 'file:') ? 'development' : 'production';
// API_BASE is same-origin in production. In dev, allow override via ?apiBase= or
// localStorage('stockrocket_api_base') so developers can point at a deployed preview.
const API_BASE = (() => {
  if (APP_ENV === 'production') return '';
  try {
    const qs = new URLSearchParams(window.location.search);
    return qs.get('apiBase') || localStorage.getItem('stockrocket_api_base') || '';
  } catch { return ''; }
})();
const APP_VERSION = '1.0.0';

// Post a trade alert into the 'alerts' channel so everyone sees it in Chat.
// Fire-and-forget: if the network fails, the trade still completes locally.
async function postTradeAlert({ code, type, symbol, shares, price }) {
  if (!code) return;
  try {
    const body = {
      channel: 'alerts',
      content: JSON.stringify({
        type,                                          // BUY | SELL
        action: type === 'BUY' ? 'bought' : 'sold',
        symbol,
        shares,
        price,
      }),
    };
    await fetch(`${API_BASE}/api/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-User-Code': code },
      body: JSON.stringify(body),
    });
  } catch (_) { /* silent -- trade already saved locally */ }
}

// Detect whether a chat message's content is an image (data URL, web URL, or
// a relative path to a bundled GIF). Used both to render images in the chat
// bubble AND when reconciling server-persisted messages after a poll.
function isImageContent(content) {
  if (!content || typeof content !== 'string') return false;
  const c = content.trim();
  if (c.startsWith('data:image/')) return true;
  if (/\.(gif|png|jpe?g|webp)(\?.*)?$/i.test(c)) return true;
  return false;
}

// ==================== PORTFOLIO / TRADES API ====================
// Server (Supabase via /api/trades) is the source of truth. localStorage is
// a fast-paint cache only -- on login we refresh from the server.

// Convert one server trade row into the client-side trade shape used by the UI.
function shapeServerTrade(t) {
  const d = t && t.executed_at ? new Date(t.executed_at) : new Date();
  return {
    id: t?.id,
    date: d.toLocaleDateString(),
    time: d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
    type: t?.trade_type,
    symbol: t?.symbol,
    name: t?.name || t?.symbol,
    shares: Number(t?.shares) || 0,
    price: Number(t?.price) || 0,
    total: Number(t?.total) || 0,
  };
}

// Shape server portfolio + trades into { cash, holdings, trades } for React state.
// Server holdings are keyed by symbol ({ NKE: {...} }); the UI expects an array
// with derived fields (currentPrice/value/gain/returnPercent) from live prices.
function hydrateServerPortfolio(serverPortfolio, serverTrades, stocks, crypto) {
  const priceLookup = new Map();
  for (const s of (stocks || [])) priceLookup.set(s.symbol, { price: s.price, name: s.name, type: 'stock' });
  for (const c of (crypto || [])) priceLookup.set(c.symbol, { price: c.price, name: c.name, type: 'crypto' });

  const holdingsMap = (serverPortfolio && serverPortfolio.holdings && typeof serverPortfolio.holdings === 'object')
    ? serverPortfolio.holdings
    : {};
  const holdings = Object.values(holdingsMap).map(h => {
    const info = priceLookup.get(h.symbol);
    const currentPrice = info?.price ?? Number(h.avgCost) ?? 0;
    const shares = Number(h.shares) || 0;
    const avgCost = Number(h.avgCost) || 0;
    const value = shares * currentPrice;
    const gain = (currentPrice - avgCost) * shares;
    const returnPercent = avgCost > 0 ? ((currentPrice - avgCost) / avgCost) * 100 : 0;
    return {
      symbol: h.symbol,
      name: h.name || info?.name || h.symbol,
      assetType: h.assetType || info?.type || 'stock',
      shares,
      avgCost,
      currentPrice,
      value,
      gain,
      returnPercent,
    };
  });

  // Server returns trades newest-first (order=executed_at.desc). UI consumers
  // call slice(-N).reverse() so they expect oldest-first -- flip here.
  const trades = (serverTrades || []).map(shapeServerTrade).reverse();

  return {
    cash: Number(serverPortfolio?.cash) || 0,
    holdings,
    trades,
  };
}

// GET /api/trades -> authoritative server portfolio + last 50 trades.
async function fetchServerPortfolio(code) {
  if (!code) return null;
  try {
    const res = await fetch(`${API_BASE}/api/trades`, { headers: { 'X-User-Code': code } });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data || !data.ok) return null;
    return { portfolio: data.portfolio, trades: data.trades || [] };
  } catch { return null; }
}

// POST /api/trades -> execute trade on the server. Server validates cash/shares
// and persists to stockrocket_trades + stockrocket_portfolios atomically.
// Returns { ok: true, portfolio, trade } on success, { ok: false, error, detail } on failure.
async function executeServerTrade({ code, type, symbol, name, assetType, shares, price }) {
  if (!code) return { ok: false, error: 'not_authenticated' };
  try {
    const res = await fetch(`${API_BASE}/api/trades`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-User-Code': code },
      body: JSON.stringify({ type, symbol, name, asset_type: assetType, shares, price }),
    });
    let data = {};
    try { data = await res.json(); } catch { data = {}; }
    if (!res.ok || !data.ok) {
      return { ok: false, error: data.error || 'trade_failed', detail: data.detail };
    }
    return { ok: true, portfolio: data.portfolio, trade: data.trade };
  } catch {
    return { ok: false, error: 'network_error' };
  }
}

// Human-readable message for server error codes.
function errorMessageForTrade(err, detail) {
  switch (err) {
    case 'insufficient_cash':     return detail || 'Not enough cash for this trade';
    case 'no_shares_to_sell':     return detail || "You don't own any of this asset";
    case 'insufficient_shares':   return detail || 'Not enough shares to sell';
    case 'invalid_shares':        return 'Invalid share amount';
    case 'invalid_price':         return 'Invalid price';
    case 'symbol_required':       return 'Symbol required';
    case 'auth_required':
    case 'auth_denied':           return 'Please sign in again';
    case 'network_error':         return 'Network error -- trade not saved. Please retry.';
    default:                      return 'Trade failed. Please try again.';
  }
}

// ==================== ACCESS CODES ====================
// v1: client-side validation, private-invite only. Moves to Supabase in v1.1.
// Tier gates UI features. Admin flag elevates to admin tools.
const ACCESS_CODES = {
  'LAUNCH2026':   { tier: 'free',   admin: false, expires: '2026-05-18', label: 'Launch Week' },
  'NEPHEW-APR18': { tier: 'family', admin: false, expires: '2026-12-31', label: 'Family' },
  'ELLA-2026':    { tier: 'family', admin: false, expires: '2027-01-01', label: 'Family' },
  'RSJ-ADMIN':    { tier: 'pro',    admin: true,  expires: '2099-01-01', label: 'Admin' },
};

// Validates against Supabase via /api/codes. Falls back to the hardcoded
// ACCESS_CODES constant if the endpoint is unreachable (launch-day belt + suspenders).
// Passwords are case-sensitive -- pass raw input to the API.
async function validateAccessCode(raw, displayName = '') {
  if (!raw) return { ok: false, error: 'Enter your password' };
  const code = raw.trim();
  try {
    const res = await fetch(`${API_BASE}/api/codes?code=${encodeURIComponent(code)}&name=${encodeURIComponent(displayName)}`);
    if (res.ok) {
      const data = await res.json();
      if (data && data.ok) {
        return { ok: true, code: data.code, tier: data.tier, admin: !!data.admin, label: data.label, email: data.email };
      }
      if (data && data.error) return { ok: false, error: data.error };
    }
    // Fall through to hardcoded on non-OK
  } catch { /* network error -- fall through */ }
  // Fallback: hardcoded ACCESS_CODES (always works for the seed codes, uppercase only)
  const entry = ACCESS_CODES[code.toUpperCase()];
  if (!entry) return { ok: false, error: 'That password is not valid' };
  if (entry.expires && new Date(entry.expires) < new Date()) {
    return { ok: false, error: 'That code has expired' };
  }
  return { ok: true, code, tier: entry.tier, admin: entry.admin, label: entry.label, fallback: true };
}

// ==================== LIVE DATA LAYER ====================
// Finnhub: calls go through our Vercel Edge proxy at /api/finnhub.
//          The API key lives in Vercel env vars (FINNHUB_KEY), never in the client.
// CoinGecko: no key needed, called directly (crypto is 24/7 real market).
async function finnhub(path, params = {}) {
  const qs = new URLSearchParams({ path, ...params });
  const res = await fetch(`${API_BASE}/api/finnhub?${qs.toString()}`);
  if (!res.ok) throw new Error(`finnhub_${res.status}`);
  return res.json();
}

const LiveData = {
  // Fetch real stock quote via the proxy
  async fetchStockQuote(symbol) {
    try {
      const data = await finnhub('quote', { symbol });
      if (data && typeof data.c === 'number' && data.c > 0) {
        return {
          price: data.c,
          change: data.d,
          changePercent: data.dp,
          high: data.h,
          low: data.l,
          open: data.o,
          prevClose: data.pc,
          timestamp: data.t ? data.t * 1000 : Date.now(),
        };
      }
      return null;
    } catch { return null; }
  },

  // Fetch all stock quotes in parallel
  async fetchAllStocks(symbols) {
    try {
      const promises = symbols.map(s => LiveData.fetchStockQuote(s));
      return await Promise.all(promises);
    } catch { return null; }
  },

  // Fetch intraday candles (may be blocked on free tier -- caller handles empty)
  async fetchStockCandles(symbol, resolution = 'D', daysBack = 30) {
    try {
      const to = Math.floor(Date.now() / 1000);
      const from = to - daysBack * 86400;
      const data = await finnhub('candle', { symbol, resolution, from, to });
      if (data && data.s === 'ok' && Array.isArray(data.c) && data.c.length > 1) {
        return data.c.map((price, i) => ({
          day: i + 1,
          price,
          timestamp: (data.t && data.t[i]) ? data.t[i] * 1000 : null,
        }));
      }
      return [];
    } catch { return []; }
  },

  // Fetch real crypto prices from CoinGecko (direct -- no key needed)
  async fetchCrypto() {
    try {
      const ids = 'bitcoin,ethereum,solana,cardano,polkadot';
      const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true`);
      const data = await res.json();
      const map = { bitcoin: 'BTC', ethereum: 'ETH', solana: 'SOL', cardano: 'ADA', polkadot: 'DOT' };
      const nameMap = { bitcoin: 'Bitcoin', ethereum: 'Ethereum', solana: 'Solana', cardano: 'Cardano', polkadot: 'Polkadot' };
      return Object.entries(data).map(([id, d]) => ({
        symbol: map[id], name: nameMap[id], price: d.usd,
        change: d.usd * (d.usd_24h_change / 100), changePercent: d.usd_24h_change || 0,
        marketCap: d.usd_market_cap ? '$' + (d.usd_market_cap / 1e9).toFixed(0) + 'B' : 'N/A'
      }));
    } catch { return null; }
  },

  // Fetch CoinGecko market_chart for crypto candles (free, no key)
  // id = coingecko coin id, days = 1/7/30/90/365
  async fetchCryptoCandles(id, days = 30) {
    try {
      const res = await fetch(`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=${days}`);
      if (!res.ok) return [];
      const data = await res.json();
      if (!Array.isArray(data.prices) || data.prices.length < 2) return [];
      // Thin out large arrays for chart perf -- aim for ~90 points
      const step = Math.max(1, Math.floor(data.prices.length / 90));
      const thinned = data.prices.filter((_, i) => i % step === 0);
      return thinned.map(([ts, price], i) => ({ day: i + 1, price, timestamp: ts }));
    } catch { return []; }
  },

  // Fetch market news via the proxy
  async fetchMarketNews() {
    try { return await finnhub('news', { category: 'general' }); }
    catch { return null; }
  },

  // Fetch company news via the proxy
  async fetchCompanyNews(symbol, daysBack = 7) {
    try {
      const to = new Date().toISOString().split('T')[0];
      const from = new Date(Date.now() - daysBack * 86400000).toISOString().split('T')[0];
      return await finnhub('company-news', { symbol, from, to });
    } catch { return null; }
  },

  // Fetch trending tickers from CoinGecko (direct)
  async fetchTrendingCrypto() {
    try {
      const res = await fetch('https://api.coingecko.com/api/v3/search/trending');
      const data = await res.json();
      return data.coins?.slice(0, 5).map(c => ({ symbol: c.item.symbol.toUpperCase(), name: c.item.name, rank: c.item.market_cap_rank })) || [];
    } catch { return []; }
  }
};

const COINGECKO_IDS = { BTC: 'bitcoin', ETH: 'ethereum', SOL: 'solana', ADA: 'cardano', DOT: 'polkadot' };
const CRYPTO_SYMBOLS = new Set(Object.keys(COINGECKO_IDS));

// Hook to fetch live data. No silent mock fallback -- if a feed is down,
// the UI should honestly show "prices unavailable" via the isLive/status flags.
function useLiveData() {
  const [stocks, setStocks] = useState(MOCK_STOCKS);      // seed with static last-known so layout doesn't flicker
  const [crypto, setCrypto] = useState(MOCK_CRYPTO);
  const [stocksLive, setStocksLive] = useState(false);
  const [cryptoLive, setCryptoLive] = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [marketOpen, setMarketOpen] = useState(() => isUsMarketOpen());

  const refresh = useCallback(async () => {
    // Crypto: 24/7 real market -- always refresh
    const liveCrypto = await LiveData.fetchCrypto();
    if (liveCrypto && liveCrypto.length > 0) {
      // Preserve category from MOCK_CRYPTO so UI filters keep working
      const merged = MOCK_CRYPTO.map(mc => {
        const live = liveCrypto.find(lc => lc.symbol === mc.symbol);
        return live ? { ...mc, ...live } : mc;
      });
      setCrypto(merged);
      setCryptoLive(true);
    } else {
      setCryptoLive(false);
    }

    // Stocks: only fetch during US market hours (avoids wasted calls + avoids
    // showing post-close wiggle; the prev-close snapshot remains on display).
    const open = isUsMarketOpen();
    setMarketOpen(open);
    if (open) {
      const symbols = MOCK_STOCKS.map(s => s.symbol);
      const quotes = await LiveData.fetchAllStocks(symbols);
      if (quotes && quotes.some(q => q && q.price)) {
        const updated = MOCK_STOCKS.map((s, i) => {
          const q = quotes[i];
          if (!q) return s;
          return { ...s, price: q.price, change: q.change, changePercent: q.changePercent,
                   high: q.high, low: q.low, open: q.open, prevClose: q.prevClose };
        });
        setStocks(updated);
        setStocksLive(true);
      } else {
        setStocksLive(false);
      }
    } else {
      // Market closed: fetch one quote pull on first load so we have honest
      // session-close numbers, then freeze.
      if (!stocksLive) {
        const symbols = MOCK_STOCKS.map(s => s.symbol);
        const quotes = await LiveData.fetchAllStocks(symbols);
        if (quotes && quotes.some(q => q && q.price)) {
          const updated = MOCK_STOCKS.map((s, i) => {
            const q = quotes[i];
            if (!q) return s;
            return { ...s, price: q.price, change: q.change, changePercent: q.changePercent,
                     high: q.high, low: q.low, open: q.open, prevClose: q.prevClose };
          });
          setStocks(updated);
          setStocksLive(true);
        }
      }
    }
    setLastUpdated(new Date());
  }, [stocksLive]);

  useEffect(() => {
    refresh();
    const interval = setInterval(refresh, 60000); // Refresh every 60s
    return () => clearInterval(interval);
  }, [refresh]);

  return { stocks, crypto, stocksLive, cryptoLive, isLive: stocksLive || cryptoLive, marketOpen, lastUpdated, refresh };
}

// Market-hours check used by useLiveData (kept in sync with useMarketCountdown)
function isUsMarketOpen(date = new Date()) {
  const et = new Date(date.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const day = et.getDay();
  const mins = et.getHours() * 60 + et.getMinutes();
  return day >= 1 && day <= 5 && mins >= (9 * 60 + 30) && mins < (16 * 60);
}

// ==================== MARKET STATUS ====================
function useMarketCountdown() {
  const [status, setStatus] = useState({ isOpen: false, label: '', countdown: '' });
  useEffect(() => {
    const update = () => {
      const now = new Date();
      const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
      const day = et.getDay();
      const h = et.getHours();
      const m = et.getMinutes();
      const mins = h * 60 + m;
      const open = 9 * 60 + 30; // 9:30 AM ET
      const close = 16 * 60; // 4:00 PM ET
      const isWeekday = day >= 1 && day <= 5;
      const isOpen = isWeekday && mins >= open && mins < close;

      if (isOpen) {
        const left = close - mins;
        const lh = Math.floor(left / 60);
        const lm = left % 60;
        setStatus({ isOpen: true, label: 'Market Open', countdown: lh + 'h ' + lm + 'm until close' });
      } else {
        // Calculate time until next open
        let nextOpen = new Date(et);
        if (isWeekday && mins < open) {
          // Today before open
          nextOpen.setHours(9, 30, 0, 0);
        } else {
          // After close or weekend -- find next weekday
          nextOpen.setDate(nextOpen.getDate() + 1);
          while (nextOpen.getDay() === 0 || nextOpen.getDay() === 6) {
            nextOpen.setDate(nextOpen.getDate() + 1);
          }
          nextOpen.setHours(9, 30, 0, 0);
        }
        const diff = nextOpen - et;
        const dh = Math.floor(diff / 3600000);
        const dm = Math.floor((diff % 3600000) / 60000);
        setStatus({ isOpen: false, label: 'Market Closed', countdown: dh + 'h ' + dm + 'm until open' });
      }
    };
    update();
    const interval = setInterval(update, 30000); // update every 30s
    return () => clearInterval(interval);
  }, []);
  return status;
}

function useAchievements(portfolio) {
  const [unlocked, setUnlocked] = useState(() => {
    try { return JSON.parse(localStorage.getItem('stockrocket_achievements') || '[]'); } catch { return []; }
  });
  const [newAchievement, setNewAchievement] = useState(null);

  useEffect(() => {
    const newly = [];
    ACHIEVEMENTS.forEach(a => {
      if (!unlocked.includes(a.id) && a.check(portfolio)) {
        newly.push(a.id);
      }
    });
    if (newly.length > 0) {
      const updated = [...unlocked, ...newly];
      setUnlocked(updated);
      try { localStorage.setItem('stockrocket_achievements', JSON.stringify(updated)); } catch {}
      // Show the first new achievement
      const achievement = ACHIEVEMENTS.find(a => a.id === newly[0]);
      setNewAchievement(achievement);
      setTimeout(() => setNewAchievement(null), 4000);
    }
  }, [portfolio]);

  return { unlocked, newAchievement, total: ACHIEVEMENTS.length };
}

//
// Sort: traders with at least 1 trade rank first by totalValue desc.
// Users with 0 trades are pushed to the bottom (alphabetical) and show
// the "Learning" strategy tag via the SQUAD_MEMBERS fallback.
function useLeaderboard(myCode, stocks, crypto) {
  const [rawPlayers, setRawPlayers] = useState([]);

  useEffect(() => {
    if (!myCode) { setRawPlayers([]); return; }
    let mounted = true;
    const poll = async () => {
      try {
        const res = await fetch(`${API_BASE}/api/leaderboard`, {
          headers: { 'X-User-Code': myCode },
        });
        const data = await res.json();
        if (!mounted || !data.ok) return;
        setRawPlayers(data.players || []);
      } catch {}
    };
    poll();
    const iv = setInterval(poll, 30000);
    return () => { mounted = false; clearInterval(iv); };
  }, [myCode]);

  // Live price index -- rebuilt on every stocks/crypto change
  const allAssets = [...(stocks || []), ...(crypto || [])];
  const priceBy = new Map(allAssets.map(a => [a.symbol, a.price]));

  // Hydrate each player's holdings and compute derived fields
  const hydrated = rawPlayers.map(p => {
    const holdingsObj = (p.holdings && typeof p.holdings === 'object') ? p.holdings : {};
    const holdingsList = Object.keys(holdingsObj).map(sym => {
      const h = holdingsObj[sym] || {};
      const shares = Number(h.shares) || 0;
      const avgCost = Number(h.avgCost) || 0;
      const livePrice = priceBy.has(sym) ? priceBy.get(sym) : avgCost;
      const value = shares * livePrice;
      const gain = value - shares * avgCost;
      const returnPercent = avgCost > 0 ? ((livePrice - avgCost) / avgCost) * 100 : 0;
      return { symbol: sym, name: h.name || sym, assetType: h.assetType || 'stock', shares, avgCost, livePrice, value, gain, returnPercent };
    });

    const cash = Number(p.cash) || 0;
    const startingCash = Number(p.starting_cash) || 100000;
    const holdingsValue = holdingsList.reduce((s, h) => s + h.value, 0);
    const totalValue = cash + holdingsValue;
    const totalGain = totalValue - startingCash;
    const gainPct = startingCash > 0 ? (totalGain / startingCash) * 100 : 0;

    const wins = holdingsList.filter(h => h.returnPercent > 0).length;
    const winRate = holdingsList.length > 0 ? Math.round((wins / holdingsList.length) * 100) : 0;

    const sortedByReturn = [...holdingsList].sort((a, b) => b.returnPercent - a.returnPercent);
    const bestH = sortedByReturn[0] || null;
    const worstH = sortedByReturn[sortedByReturn.length - 1] || null;

    return {
      code: p.code,
      name: p.label || p.code,
      isYou: p.code === myCode,
      isAdmin: !!p.is_admin,
      cash,
      invested: Math.max(0, startingCash - cash),
      startingCash,
      totalValue,
      gain: totalGain,
      gainPct,
      trades: Number(p.trade_count) || 0,
      holdings: holdingsList.length,
      holdingsList,
      topHolding: bestH ? bestH.symbol : '--',
      bestTrade: bestH ? { symbol: bestH.symbol, returnPct: bestH.returnPercent } : { symbol: '--', returnPct: 0 },
      worstTrade: worstH ? { symbol: worstH.symbol, returnPct: worstH.returnPercent } : { symbol: '--', returnPct: 0 },
      winRate,
    };
  });

  // Active traders rank by portfolio value. 0-trade users land at the bottom
  // in alphabetical order so a brand-new squad member doesn't "outrank"
  // someone who actually put money to work.
  const active = hydrated.filter(p => p.trades > 0).sort((a, b) => b.totalValue - a.totalValue);
  const learners = hydrated.filter(p => p.trades === 0).sort((a, b) => a.name.localeCompare(b.name));
  const all = [...active, ...learners];
  all.forEach((p, i) => { p.rank = i + 1; });
  return all;
}

function StockDetailPage({ symbol, stocks, crypto, portfolio, setPortfolio, setNotification, onBack, user, code }) {
  const allAssets = [...(stocks || []), ...(crypto || [])];
  const asset = allAssets.find(a => a.symbol === symbol);
  const holding = portfolio?.holdings?.find(h => h.symbol === symbol);
  const [tradeType, setTradeType] = useState('BUY');
  const [shares, setShares] = useState('');
  const { data: chartData, loading: chartLoading } = useChartData(asset?.symbol, 90);
  const total = asset ? parseFloat(shares || 0) * asset.price : 0;

  const executeTrade = async () => {
    if (!asset || !shares || parseFloat(shares) <= 0) return;
    const qty = parseFloat(shares);
    // Client-side pre-check (server re-validates authoritatively)
    if (tradeType === 'BUY' && qty * asset.price > portfolio.cash + 0.005) {
      setNotification({ type: 'error', message: 'Not enough cash' }); return;
    }
    const assetType = asset.type || (crypto?.some(c => c.symbol === asset.symbol) ? 'crypto' : 'stock');
    const result = await executeServerTrade({
      code, type: tradeType, symbol: asset.symbol, name: asset.name,
      assetType, shares: qty, price: asset.price,
    });
    if (!result.ok) {
      setNotification({ type: 'error', message: errorMessageForTrade(result.error, result.detail) });
      return;
    }
    // Server is source of truth. Hydrate with live prices, append new trade to history.
    const hydrated = hydrateServerPortfolio(result.portfolio, [], stocks, crypto);
    const newTrade = shapeServerTrade(result.trade);
    setPortfolio(prev => ({
      cash: hydrated.cash,
      holdings: hydrated.holdings,
      trades: [...(prev.trades || []), newTrade],
    }));
    setNotification({ type: 'success', message: `${tradeType} ${qty} ${asset.symbol} @ ${formatCurrency(asset.price)}` });
    setShares('');
    // Broadcast to Trade Alerts channel (fire-and-forget)
    postTradeAlert({ code, type: tradeType, symbol: asset.symbol, shares: qty, price: asset.price });
  };

  if (!asset) return <div className="empty-state"><Icon name="error" /><h3>Asset not found</h3><button className="btn btn-secondary" onClick={onBack}>Go Back</button></div>;

// No client-side random chart generation. Every chart is real historical data
// fetched from Finnhub (stocks) or CoinGecko (crypto) via useChartData below.
function generateChartData() {
  return [];
}

// Real historical chart hook. Returns { data, loading, error, source }.
// Works for both stocks (via our Finnhub proxy) and crypto (via CoinGecko).
// Gracefully returns an empty array if the source is unavailable -- the
// NebulaChart component will render a "LIVE CHART CONNECTING" placeholder.
function useChartData(symbol, days = 30) {
  const [state, setState] = useState({ data: [], loading: true, error: null, source: null });
  useEffect(() => {
    if (!symbol) { setState({ data: [], loading: false, error: null, source: null }); return; }
    let cancelled = false;
    (async () => {
      setState(s => ({ ...s, loading: true, error: null }));
      try {
        if (CRYPTO_SYMBOLS.has(symbol)) {
          const id = COINGECKO_IDS[symbol];
          const points = await LiveData.fetchCryptoCandles(id, days);
          if (!cancelled) setState({ data: points, loading: false, error: null, source: 'coingecko' });
        } else {
          // Finnhub candle resolution: D=daily (fine for 30/90 day views)
          const resolution = days <= 7 ? '60' : 'D';
          const points = await LiveData.fetchStockCandles(symbol, resolution, days);
          if (!cancelled) setState({ data: points, loading: false, error: points.length ? null : 'unavailable', source: 'finnhub' });
        }
      } catch (e) {
        if (!cancelled) setState({ data: [], loading: false, error: String(e.message || e), source: null });
      }
    })();
    return () => { cancelled = true; };
  }, [symbol, days]);
  return state;
}

// Portfolio-level chart: synthesize from real holdings' historical data.
// For the MVP we fetch daily candles for each holding, weight by shares, and sum.
// If any holding's history isn't available, we fall back to a flat line at current
// value (honest: "we don't have history for this position yet").
function usePortfolioChart(portfolio, days = 30) {
  const [state, setState] = useState({ data: [], loading: true });
  useEffect(() => {
    if (!portfolio?.holdings?.length) {
      // No positions: show cash as a flat line at starting value
      const cash = portfolio?.cash || 0;
      setState({ data: [{ day: 1, price: cash }, { day: 2, price: cash }], loading: false });
      return;
    }
    let cancelled = false;
    (async () => {
      setState(s => ({ ...s, loading: true }));
      const series = await Promise.all(portfolio.holdings.map(async h => {
        const points = CRYPTO_SYMBOLS.has(h.symbol)
          ? await LiveData.fetchCryptoCandles(COINGECKO_IDS[h.symbol], days)
          : await LiveData.fetchStockCandles(h.symbol, 'D', days);
        return { shares: h.shares, points };
      }));
      if (cancelled) return;
      // Align on index (not timestamp) -- good enough for a visual overview
      const maxLen = Math.max(...series.map(s => s.points.length), 0);
      if (maxLen < 2) {
        const tv = (portfolio.cash || 0) + portfolio.holdings.reduce((s, h) => s + h.value, 0);
        setState({ data: [{ day: 1, price: tv }, { day: 2, price: tv }], loading: false });
        return;
      }
      const combined = [];
      for (let i = 0; i < maxLen; i++) {
        let sum = portfolio.cash || 0;
        for (const s of series) {
          const p = s.points[i] || s.points[s.points.length - 1];
          if (p) sum += p.price * s.shares;
        }
        combined.push({ day: i + 1, price: sum });
      }
      setState({ data: combined, loading: false });
    })();
    return () => { cancelled = true; };
  }, [portfolio, days]);
  return state;
}

function formatCurrency(val, dec = 2) {
  return '$' + Number(val).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function formatCurrencySplit(val) {
  const parts = Number(val).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).split('.');
  return { whole: '$' + parts[0], decimal: '.' + parts[1] };
}

}

// ==================== SVG CHART ====================
function NebulaChart({ data, height = 200, loading = false, label = null }) {
  if (!data || data.length < 2) {
    const placeholderLabel = label || (loading ? 'LOADING CHART' : 'CHART UNAVAILABLE');
    return (
      <div className="chart-container" style={{ height, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--surface-container-low)', borderRadius: 'var(--radius-lg)', border: '1px dashed var(--outline-variant)' }}>
        <div style={{ textAlign: 'center', color: 'var(--on-surface-variant)', fontFamily: 'var(--font-label)', fontSize: 11, letterSpacing: '0.1em' }}>
          <div style={{ marginBottom: 6, opacity: 0.6 }}>◦ ◦ ◦</div>
          {placeholderLabel}
        </div>
      </div>
    );
  }
  const prices = data.map(d => d.price);
  const min = Math.min(...prices) * 0.998;
  const max = Math.max(...prices) * 1.002;
  const range = max - min || 1;
  const w = 1000, h = 200;
  const isUp = prices[prices.length - 1] >= prices[0];
  const color = isUp ? '#00FFA3' : '#ff716c';
  const pts = prices.map((p, i) => `${(i / (prices.length - 1)) * w},${h - ((p - min) / range) * h}`);
  const areaPath = `M0,${h} L${pts.join(' L')} L${w},${h} Z`;
  const lastX = w;
  const lastY = h - ((prices[prices.length - 1] - min) / range) * h;

  return (
    <div className="chart-container" style={{ height }}>
      <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%' }}>
        <defs>
          <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.25" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        <path d={areaPath} fill="url(#chartGrad)" />
        <polyline fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" points={pts.join(' ')} />
        <circle cx={lastX} cy={lastY} r="5" fill={color} />
        <circle cx={lastX} cy={lastY} r="12" fill={color} fillOpacity="0.2" />
      </svg>
    </div>
  );
}

function Sparkline({ data, color = '#00FFA3', width = 80, height = 32 }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const points = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * (height - 4) - 2}`).join(' ');
  return <svg width={width} height={height}><polyline fill="none" stroke={color} strokeWidth="1.5" points={points} /></svg>;
}

// ==================== LOGIN PAGE ====================
function LoginPage({ onLogin }) {
  const [code, setCode] = useState('');
  const [displayName, setDisplayName] = useState('');
  const [error, setError] = useState('');
  const [submitting, setSubmitting] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    if (!displayName.trim()) return setError('Enter your name');
    if (!code.trim()) return setError('Enter your password');
    setSubmitting(true);
    try {
      // Passwords are case-sensitive -- pass exactly what the user typed
      const result = await validateAccessCode(code, displayName.trim());
      if (!result.ok) { setError(result.error); return; }
      onLogin({
        name: displayName.trim(),
        code: result.code,
        tier: result.tier,
        isAdmin: result.admin,
        label: result.label,
        email: result.email,
      });
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div className="login-page">
      <div className="login-container">
        <div className="login-logo">
          <div className="rocket-icon" style={{ fontSize: 32 }}>🚀</div>
          <h1>STOCK<span>ROCKET</span></h1>
        </div>
        <p className="login-subtitle">Learn. Trade. Launch Your Portfolio.</p>
        <form className="login-form" onSubmit={handleSubmit}>
          <div>
            <div className="login-field-header"><label className="input-label">Name</label></div>
            <input className="input-field" type="text" value={displayName} onChange={e => setDisplayName(e.target.value)} maxLength={24} autoFocus inputMode="text" autoComplete="off" />
          </div>
          <div>
            <div className="login-field-header">
              <label className="input-label">Password</label>
            </div>
            <input
              className="input-field"
              type="password"
              value={code}
              onChange={e => setCode(e.target.value)}
              autoCorrect="off"
              spellCheck="false"
              autoComplete="new-password"
            />
          </div>
          {error && <div style={{ color: '#ff716c', fontSize: 13, padding: '4px 8px', background: 'rgba(255,113,108,0.08)', borderRadius: 4 }}>{error}</div>}
          <button type="submit" className="login-btn" disabled={submitting}>
            {submitting ? 'Launching...' : <>Launch <Icon name="north_east" size={18} /></>}
          </button>
        </form>
        <div className="login-footer">
          <span style={{ color: 'var(--primary-fixed)' }}>{'\u25CF'}</span> v{APP_VERSION}
        </div>
      </div>
    </div>
  );
}

                <div style={{ fontFamily: 'var(--font-headline)', fontWeight: 700, color: t.type === 'BUY' ? 'var(--error)' : 'var(--primary-fixed)' }}>{t.type === 'BUY' ? '-' : '+'}{formatCurrency(t.total)}</div>
              </div>
            ))}
          </div>
        </div>
        <div>
          <h3 className="section-title" style={{ marginBottom: 16 }}><Icon name="auto_awesome" size={20} /> Portfolio_Analysis</h3>
          {(() => {
            const totalVal = portfolio.cash + portfolio.holdings.reduce((s, h) => s + h.value, 0);
            const totalInvested = portfolio.holdings.reduce((s, h) => s + (h.avgCost * h.shares), 0);
            const totalGainAmt = portfolio.holdings.reduce((s, h) => s + h.gain, 0);
            const winCount = portfolio.holdings.filter(h => h.gain > 0).length;
            const loseCount = portfolio.holdings.filter(h => h.gain < 0).length;
            const bestHolding = portfolio.holdings.length > 0 ? [...portfolio.holdings].sort((a, b) => b.returnPercent - a.returnPercent)[0] : null;
            const worstHolding = portfolio.holdings.length > 0 ? [...portfolio.holdings].sort((a, b) => a.returnPercent - b.returnPercent)[0] : null;
            const sectorMap = {};
            portfolio.holdings.forEach(h => {
              const stock = stocks.find(s => s.symbol === h.symbol);
              const sector = stock?.sector || 'Other';
              sectorMap[sector] = (sectorMap[sector] || 0) + h.value;
            });
            return (
              <div className="card" style={{ padding: 24 }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 20 }}>
                  <div style={{ padding: 16, background: 'var(--surface-container-highest)', borderRadius: 'var(--radius-lg)' }}>
                    <span className="label-system">Total Invested</span>
                    <p style={{ fontFamily: 'var(--font-headline)', fontSize: 22, fontWeight: 700, marginTop: 4 }}>{formatCurrency(totalInvested)}</p>
                  </div>
                  <div style={{ padding: 16, background: 'var(--surface-container-highest)', borderRadius: 'var(--radius-lg)' }}>
                    <span className="label-system">Total Return</span>
                    <p style={{ fontFamily: 'var(--font-headline)', fontSize: 22, fontWeight: 700, marginTop: 4, color: totalGainAmt >= 0 ? 'var(--primary-fixed)' : 'var(--error)' }}>{totalGainAmt >= 0 ? '+' : ''}{formatCurrency(totalGainAmt)}</p>
                  </div>
                  <div style={{ padding: 16, background: 'var(--surface-container-highest)', borderRadius: 'var(--radius-lg)' }}>
                    <span className="label-system">Win / Loss</span>
                    <p style={{ fontFamily: 'var(--font-headline)', fontSize: 22, fontWeight: 700, marginTop: 4 }}><span className="text-primary">{winCount}</span> / <span className="text-error">{loseCount}</span></p>
                  </div>
                  <div style={{ padding: 16, background: 'var(--surface-container-highest)', borderRadius: 'var(--radius-lg)' }}>
                    <span className="label-system">Total Trades</span>
                    <p style={{ fontFamily: 'var(--font-headline)', fontSize: 22, fontWeight: 700, marginTop: 4 }}>{portfolio.trades.length}</p>
                  </div>
                </div>
                {bestHolding && <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderTop: '1px solid rgba(73,72,71,0.05)' }}>
                  <span className="label-system">Best Performer</span>
                  <span style={{ fontFamily: 'var(--font-headline)', fontWeight: 700, color: 'var(--primary-fixed)' }}>{bestHolding.symbol} +{bestHolding.returnPercent.toFixed(1)}%</span>
                </div>}
                {worstHolding && <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderTop: '1px solid rgba(73,72,71,0.05)' }}>
                  <span className="label-system">Worst Performer</span>
                  <span style={{ fontFamily: 'var(--font-headline)', fontWeight: 700, color: 'var(--error)' }}>{worstHolding.symbol} {worstHolding.returnPercent.toFixed(1)}%</span>
                </div>}
                {Object.keys(sectorMap).length > 0 && <>
                  <div style={{ padding: '10px 0 4px', borderTop: '1px solid rgba(73,72,71,0.05)' }}><span className="label-system">Sector Allocation</span></div>
                  {Object.entries(sectorMap).sort((a, b) => b[1] - a[1]).map(([sector, val]) => (
                    <div key={sector} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 0' }}>
                      <span style={{ fontSize: 13, flex: 1 }}>{sector}</span>
                      <div className="ticker-progress" style={{ flex: 2, height: 4 }}><div className="ticker-progress-fill" style={{ width: `${(val / totalVal) * 100}%` }}></div></div>
                      <span style={{ fontSize: 11, fontFamily: 'var(--font-headline)', fontWeight: 600, width: 40, textAlign: 'right' }}>{((val / totalVal) * 100).toFixed(0)}%</span>
                    </div>
                  ))}
                </>}
                {portfolio.holdings.length === 0 && <p className="text-muted" style={{ fontSize: 14, textAlign: 'center', padding: 16 }}>Make your first trade to see portfolio analysis here.</p>}
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

// ==================== TRADE ====================
function TradePage({ stocks, crypto, portfolio, setPortfolio, setNotification, user, code }) {
  const [searchTerm, setSearchTerm] = useState('');
  const [selectedAsset, setSelectedAsset] = useState(stocks[0]);
  const [tradeType, setTradeType] = useState('BUY');
  const [shares, setShares] = useState('');
  const [showConfirm, setShowConfirm] = useState(false);
  const [orderType, setOrderType] = useState('market'); // market, limit
  const [limitPrice, setLimitPrice] = useState('');
  const [showSuccess, setShowSuccess] = useState(null);

  const allAssets = [...stocks, ...crypto];
  const filtered = searchTerm ? allAssets.filter(a => a.symbol.toLowerCase().includes(searchTerm.toLowerCase()) || a.name.toLowerCase().includes(searchTerm.toLowerCase())) : allAssets;
  const execPrice = orderType === 'limit' && limitPrice ? parseFloat(limitPrice) : (selectedAsset?.price || 0);
  const total = selectedAsset ? parseFloat(shares || 0) * execPrice : 0;
  const { data: chartData, loading: chartLoading } = useChartData(selectedAsset?.symbol, 30);

  // Quick-buy preset amounts
  const quickAmounts = [1, 5, 10, 25];
  const existing = selectedAsset ? portfolio.holdings.find(h => h.symbol === selectedAsset.symbol) : null;

  const validateTrade = () => {
    if (!shares || parseFloat(shares) <= 0) { setNotification({ type: 'error', message: 'Enter a valid number of shares' }); return false; }
    if (!selectedAsset) { setNotification({ type: 'error', message: 'Select an asset first' }); return false; }
    const qty = parseFloat(shares);
    if (tradeType === 'BUY' && total > portfolio.cash) { setNotification({ type: 'error', message: `Not enough cash! You need ${formatCurrency(total)} but have ${formatCurrency(portfolio.cash)}` }); return false; }
    if (tradeType === 'SELL') {
      if (!existing) { setNotification({ type: 'error', message: `You don't own any ${selectedAsset.symbol} to sell` }); return false; }
      if (qty > existing.shares) { setNotification({ type: 'error', message: `You only have ${existing.shares} shares of ${selectedAsset.symbol}` }); return false; }
    }
    return true;
  };

  const handleTradeClick = () => { if (validateTrade()) setShowConfirm(true); };

  const executeTrade = async () => {
    setShowConfirm(false);
    const qty = parseFloat(shares);
    const assetType = selectedAsset.type || (crypto?.some(c => c.symbol === selectedAsset.symbol) ? 'crypto' : 'stock');
    const result = await executeServerTrade({
      code, type: tradeType, symbol: selectedAsset.symbol, name: selectedAsset.name,
      assetType, shares: qty, price: execPrice,
    });
    if (!result.ok) {
      setNotification({ type: 'error', message: errorMessageForTrade(result.error, result.detail) });
      return;
    }
    // Server confirmed + persisted. Hydrate with live prices, append trade to history.
    const hydrated = hydrateServerPortfolio(result.portfolio, [], stocks, crypto);
    const newTrade = { ...shapeServerTrade(result.trade), orderType };
    setPortfolio(prev => ({
      cash: hydrated.cash,
      holdings: hydrated.holdings,
      trades: [...(prev.trades || []), newTrade],
    }));
    setShowSuccess(newTrade);
    setShares('');
    setLimitPrice('');
    setTimeout(() => setShowSuccess(null), 4000);
    // Broadcast to Trade Alerts channel (fire-and-forget)
    postTradeAlert({ code, type: tradeType, symbol: selectedAsset.symbol, shares: qty, price: execPrice });
  };

  // Educational tip based on current action
  const getTip = () => {
    if (tradeType === 'BUY' && total > portfolio.cash * 0.5) return { icon: 'warning', text: "Careful! This trade would use more than half your cash. Diversification means spreading your money across different stocks to reduce risk." };
    if (tradeType === 'BUY') return { icon: 'lightbulb', text: "When you buy a stock, you're buying a tiny piece of that company. If the company does well, your piece becomes more valuable!" };
    if (tradeType === 'SELL' && existing && existing.gain > 0) return { icon: 'celebration', text: `Nice! You're in profit on ${selectedAsset.symbol}. Selling at a gain is called 'taking profits'. Some traders sell a portion and keep the rest.` };
    if (tradeType === 'SELL' && existing && existing.gain < 0) return { icon: 'info', text: `Selling at a loss is called 'cutting losses'. Sometimes it's smart to sell a loser to free up cash for better opportunities.` };
    return { icon: 'school', text: "Paper trading lets you practice with fake money so you can learn without any risk. Every trade here works exactly like the real stock market!" };
  };
  const tip = getTip();

  return (
    <div>
      <h1 style={{ fontFamily: 'var(--font-headline)', fontSize: 'clamp(24px, 3vw, 36px)', fontWeight: 700, letterSpacing: '-0.03em', marginBottom: 8 }}>Trade Terminal</h1>
      <p className="text-muted" style={{ fontSize: 14, marginBottom: 32 }}>Cash available: {formatCurrency(portfolio.cash)}</p>

      {/* Success Toast */}
      {showSuccess && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', animation: 'fadeIn 0.2s ease' }}>
          <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)' }} />
          <div style={{ position: 'relative', textAlign: 'center', padding: '48px 64px', maxWidth: 420 }}>
            {/* Celebration particles */}
            <div style={{ position: 'absolute', inset: -40, overflow: 'hidden', pointerEvents: 'none' }}>
              {['🚀','💰','📈','💎','⚡','🎯','🔥','💪'].map((e, i) => (
                <span key={i} style={{ position: 'absolute', fontSize: 24, left: `${10 + (i * 12)}%`, top: '-20px', animation: `fall ${1.5 + Math.random()}s ease-in forwards`, animationDelay: `${i * 0.1}s`, opacity: 0 }}>{e}</span>
              ))}
            </div>
            <div style={{ fontSize: 64, marginBottom: 16, animation: 'bounceIn 0.5s ease' }}>{showSuccess.type === 'BUY' ? '🚀' : '💰'}</div>
            <h2 style={{ fontFamily: 'var(--font-headline)', fontSize: 28, fontWeight: 900, marginBottom: 8, color: 'var(--on-surface)' }}>
              {showSuccess.type === 'BUY' ? 'Purchase Complete!' : 'Sale Complete!'}
            </h2>
            <p style={{ fontSize: 16, color: 'var(--on-surface-variant)', marginBottom: 16 }}>
              {showSuccess.type === 'BUY' ? 'Bought' : 'Sold'} <strong>{showSuccess.shares} {showSuccess.symbol}</strong> @ {formatCurrency(showSuccess.price)}
            </p>
            <div style={{ padding: 20, background: 'var(--surface-container-high)', borderRadius: 'var(--radius-xl)', marginBottom: 20, border: `1px solid ${showSuccess.type === 'BUY' ? 'rgba(255,113,108,0.3)' : 'rgba(0,255,163,0.3)'}` }}>
              <div style={{ fontFamily: 'var(--font-headline)', fontSize: 36, fontWeight: 900, color: showSuccess.type === 'BUY' ? 'var(--error)' : 'var(--primary-fixed)' }}>
                {showSuccess.type === 'BUY' ? '-' : '+'}{formatCurrency(showSuccess.total)}
              </div>
            </div>
            <p className="text-muted" style={{ fontSize: 12 }}>Saved to your portfolio</p>
          </div>
        </div>
      )}
      <style>{`
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(400px) rotate(720deg); opacity: 0; } }
      `}</style>

      <div className="two-col">
        {/* Left: Asset Browser + Chart */}
        <div>
          <div className="card" style={{ marginBottom: 24 }}>
            <div className="input-with-icon" style={{ marginBottom: 20 }}><Icon name="search" /><input className="input-field" placeholder="Search stocks & crypto..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /></div>
            <div style={{ maxHeight: 360, overflowY: 'auto' }}>
              {filtered.slice(0, 10).map(a => {
                const owned = portfolio.holdings.find(h => h.symbol === a.symbol);
                return (
                  <div key={a.symbol} className="stock-row" style={{ cursor: 'pointer', padding: '12px 8px', borderRadius: 'var(--radius-lg)', background: selectedAsset?.symbol === a.symbol ? 'rgba(0,255,163,0.08)' : 'transparent' }} onClick={() => { setSelectedAsset(a); setShares(''); }}>
                    <div className="stock-icon-badge" style={{ background: a.change >= 0 ? 'rgba(0,255,163,0.15)' : 'rgba(255,113,108,0.15)', color: a.change >= 0 ? 'var(--primary-fixed)' : 'var(--error)' }}>{a.symbol.slice(0, 2)}</div>
                    <div className="stock-info">
                      <div className="stock-symbol-text">{a.symbol} {owned && <span style={{ fontSize: 10, color: 'var(--secondary)' }}>({owned.shares} owned)</span>}</div>
                      <div className="stock-name-text">{a.name}</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontFamily: 'var(--font-headline)', fontWeight: 700 }}>{formatCurrency(a.price)}</div>
                      <div style={{ fontFamily: 'var(--font-headline)', fontSize: 12, color: a.change >= 0 ? 'var(--primary-fixed)' : 'var(--error)' }}>{a.change >= 0 ? '+' : ''}{a.changePercent.toFixed(2)}%</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          {selectedAsset && (
            <div className="card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <div>
                  <div style={{ fontFamily: 'var(--font-headline)', fontSize: 20, fontWeight: 700 }}>{selectedAsset.symbol}</div>
                  <div className="stock-name-text">{selectedAsset.name}</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontFamily: 'var(--font-headline)', fontSize: 24, fontWeight: 700 }}>{formatCurrency(selectedAsset.price)}</div>
                  <span className={`badge ${selectedAsset.change >= 0 ? 'badge-primary' : 'badge-error'}`}>{selectedAsset.change >= 0 ? '+' : ''}{selectedAsset.changePercent.toFixed(2)}%</span>
                </div>
              </div>
              <NebulaChart data={chartData} height={180} loading={chartLoading} />
              {existing && (
                <div style={{ marginTop: 16, padding: 12, background: 'var(--surface-container-highest)', borderRadius: 'var(--radius-lg)' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
                    <span className="label-system">Your_Position</span>
                    <span style={{ fontFamily: 'var(--font-headline)', fontWeight: 700 }}>{existing.shares} shares @ {formatCurrency(existing.avgCost)} avg</span>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginTop: 4 }}>
                    <span className="label-system">P/L</span>
                    <span className={existing.gain >= 0 ? 'text-primary' : 'text-error'} style={{ fontFamily: 'var(--font-headline)', fontWeight: 700 }}>
                      {existing.gain >= 0 ? '+' : ''}{formatCurrency(existing.gain)} ({existing.returnPercent.toFixed(1)}%)
                    </span>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Right: Order Form */}
        <div>
          <div className="card">
            <h3 className="section-title" style={{ marginBottom: 20 }}><Icon name="receipt_long" size={20} /> Place Order</h3>

            {/* Buy/Sell Toggle */}
            <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
              <button className={`btn ${tradeType === 'BUY' ? 'btn-primary' : 'btn-secondary'}`} style={{ flex: 1, ...(tradeType === 'BUY' ? { background: 'linear-gradient(135deg, #ff716c, #d7383b)', boxShadow: '0 0 20px rgba(255,113,108,0.3)', color: '#fff' } : {}) }} onClick={() => setTradeType('BUY')}>
                <Icon name="add_circle" size={16} /> Buy
              </button>
              <button className={`btn ${tradeType === 'SELL' ? 'btn-primary' : 'btn-secondary'}`} style={{ flex: 1 }} onClick={() => setTradeType('SELL')}>
                <Icon name="remove_circle" size={16} /> Sell
              </button>
            </div>

            {selectedAsset && <>
              {/* Asset display */}
              <div style={{ marginBottom: 16 }}>
                <label className="input-label">Asset</label>
                <div className="input-field" style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'default' }}>
                  <div className="stock-icon-badge" style={{ width: 24, height: 24, fontSize: 8, background: 'rgba(0,255,163,0.15)', color: 'var(--primary-fixed)' }}>{selectedAsset.symbol.slice(0, 2)}</div>
                  <span style={{ fontWeight: 700 }}>{selectedAsset.symbol}</span>
                  <span className="text-muted" style={{ fontSize: 12 }}>{selectedAsset.name}</span>
                </div>
              </div>

              {/* Order Type */}
              <div style={{ marginBottom: 16 }}>
                <label className="input-label">Order_Type</label>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button className={`btn btn-sm ${orderType === 'market' ? 'btn-ghost' : 'btn-secondary'}`} style={orderType === 'market' ? { background: 'var(--primary-fixed)', color: 'var(--on-primary)' } : {}} onClick={() => setOrderType('market')}>Market</button>
                  <button className={`btn btn-sm ${orderType === 'limit' ? 'btn-ghost' : 'btn-secondary'}`} style={orderType === 'limit' ? { background: 'var(--primary-fixed)', color: 'var(--on-primary)' } : {}} onClick={() => setOrderType('limit')}>Limit</button>
                </div>
                <p className="text-muted" style={{ fontSize: 11, marginTop: 6 }}>
                  {orderType === 'market' ? 'Market order: buy/sell at the current price right now' : 'Limit order: set the max price you\'re willing to pay (or min to sell at)'}
                </p>
              </div>

              {/* Limit Price (only for limit orders) */}
              {orderType === 'limit' && (
                <div style={{ marginBottom: 16 }}>
                  <label className="input-label">{tradeType === 'BUY' ? 'Max_Price' : 'Min_Price'}</label>
                  <input className="input-field" type="number" placeholder={formatCurrency(selectedAsset.price)} value={limitPrice} onChange={e => setLimitPrice(e.target.value)} min="0" step="0.01" />
                </div>
              )}

              {/* Shares + Quick Amounts */}
              <div style={{ marginBottom: 16 }}>
                <label className="input-label">Shares</label>
                <input className="input-field" type="number" placeholder="How many shares?" value={shares} onChange={e => setShares(e.target.value)} min="0" step="1" />
                <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                  {quickAmounts.map(amt => (
                    <button key={amt} className="btn btn-secondary btn-sm" style={{ fontSize: 11, padding: '4px 10px' }} onClick={() => setShares(String(amt))}>{amt}</button>
                  ))}
                  {tradeType === 'SELL' && existing && (
                    <button className="btn btn-secondary btn-sm" style={{ fontSize: 11, padding: '4px 10px', color: 'var(--error)' }} onClick={() => setShares(String(existing.shares))}>Sell All</button>
                  )}
                </div>
              </div>

              {/* Order Summary */}
              <div style={{ padding: 16, background: 'var(--surface-container-highest)', borderRadius: 'var(--radius-lg)', marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span className="label-system">Price_Per_Share</span>
                  <span style={{ fontFamily: 'var(--font-headline)', fontWeight: 600 }}>{formatCurrency(execPrice)}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span className="label-system">Shares</span>
                  <span style={{ fontFamily: 'var(--font-headline)', fontWeight: 600 }}>{shares || '0'}</span>
                </div>
                <div style={{ height: 1, background: 'rgba(73,72,71,0.1)', margin: '8px 0' }}></div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span className="label-system" style={{ fontSize: 12 }}>Estimated_Total</span>
                  <span style={{ fontFamily: 'var(--font-headline)', fontSize: 22, fontWeight: 700 }}>{formatCurrency(total)}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span className="label-system">Cash_Available</span>
                  <span className="text-muted" style={{ fontFamily: 'var(--font-headline)', fontSize: 13 }}>{formatCurrency(portfolio.cash)}</span>
                </div>
                {tradeType === 'BUY' && total > 0 && (
                  <div style={{ marginTop: 8 }}>
                    <div className="ticker-progress"><div className="ticker-progress-fill" style={{ width: `${Math.min((total / portfolio.cash) * 100, 100)}%`, background: total > portfolio.cash ? 'var(--error)' : 'var(--primary-fixed)' }}></div></div>
                    <p className="text-muted" style={{ fontSize: 10, marginTop: 4 }}>{((total / portfolio.cash) * 100).toFixed(1)}% of your available cash</p>
                  </div>
                )}
              </div>

              {/* Educational Tip */}
              <div style={{ padding: 12, background: 'rgba(114,220,255,0.05)', borderRadius: 'var(--radius-lg)', marginBottom: 16, display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                <Icon name={tip.icon} size={18} className="text-tertiary" style={{ flexShrink: 0, marginTop: 2 }} />
                <p style={{ fontSize: 12, lineHeight: 1.5, color: 'var(--on-surface-variant)' }}>{tip.text}</p>
              </div>

              {/* Execute Button */}
              <button className="btn btn-primary" style={{ width: '100%', padding: 14, ...(tradeType === 'BUY' ? { background: 'linear-gradient(135deg, #ff716c, #d7383b)', color: '#fff', boxShadow: '0 0 20px rgba(255,113,108,0.3)' } : {}) }} onClick={handleTradeClick}>
                <Icon name={tradeType === 'BUY' ? 'rocket_launch' : 'sell'} size={18} />
                {tradeType === 'BUY' ? `Buy ${shares || '0'} ${selectedAsset.symbol}` : `Sell ${shares || '0'} ${selectedAsset.symbol}`}
              </button>
            </>}
          </div>

          {/* Recent Trades */}
          {portfolio.trades.length > 0 && (
            <div className="card" style={{ marginTop: 24 }}>
              <h3 className="label-system" style={{ fontSize: 12, marginBottom: 16 }}>Recent_Trades</h3>
              {portfolio.trades.slice(-5).reverse().map((t, i) => (
                <div key={i} className="stock-row" style={{ padding: '8px 0' }}>
                  <div className="stock-icon-badge" style={{ width: 28, height: 28, background: t.type === 'BUY' ? 'rgba(255,113,108,0.15)' : 'rgba(0,255,163,0.15)', color: t.type === 'BUY' ? 'var(--error)' : 'var(--primary-fixed)' }}>
                    <Icon name={t.type === 'BUY' ? 'arrow_downward' : 'arrow_upward'} size={14} />
                  </div>
                  <div className="stock-info">
                    <div style={{ fontSize: 12, fontFamily: 'var(--font-headline)', fontWeight: 600 }}>{t.type} {t.shares} {t.symbol}</div>
                    <div className="stock-name-text">{t.date} {t.time || ''}</div>
                  </div>
                  <div style={{ fontSize: 12, fontFamily: 'var(--font-headline)', fontWeight: 700 }}>{formatCurrency(t.total)}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Confirmation Modal */}

  const [amount, setAmount] = useState('');
  const [showConfirm, setShowConfirm] = useState(false);
  const [showSuccess, setShowSuccess] = useState(null);

  const selected = selectedCrypto ? crypto.find(c => c.symbol === selectedCrypto) : null;
  const qty = parseFloat(amount || 0);
  const total = selected ? qty * selected.price : 0;
  const existing = selected ? portfolio?.holdings?.find(h => h.symbol === selected.symbol) : null;

  const executeCryptoTrade = async () => {
    if (!selected || qty <= 0) return;
    setShowConfirm(false);
    // Client-side pre-check (server re-validates authoritatively)
    if (tradeType === 'BUY' && qty * selected.price > portfolio.cash + 0.005) {
      setNotification({ type: 'error', message: 'Not enough cash' }); return;
    }
    const result = await executeServerTrade({
      code, type: tradeType, symbol: selected.symbol, name: selected.name,
      assetType: 'crypto', shares: qty, price: selected.price,
    });
    if (!result.ok) {
      setNotification({ type: 'error', message: errorMessageForTrade(result.error, result.detail) });
      return;

    // Server returns the full portfolio (stocks + crypto). Hydrate with live prices.
    const hydrated = hydrateServerPortfolio(result.portfolio, [], stocks, crypto);
    const newTrade = shapeServerTrade(result.trade);

      cash: hydrated.cash,
      holdings: hydrated.holdings,
      trades: [...(prev.trades || []), newTrade],
    }));
    setShowSuccess(newTrade);

function ChatPage({ user, displayName, code, isAdmin }) {
  const [activeRoom, setActiveRoom] = useState('general');
  const [messages, setMessages] = useState([]);
  const [loadingMessages, setLoadingMessages] = useState(true);
  const [newMsg, setNewMsg] = useState('');
  const [showEmojiPicker, setShowEmojiPicker] = useState(null); // message id for reaction picker
  const [showQuickEmoji, setShowQuickEmoji] = useState(false); // input emoji picker
  const [showGifPicker, setShowGifPicker] = useState(false);
  const [gifSearch, setGifSearch] = useState('');
  const [gifResults, setGifResults] = useState([]);
  const [gifLoading, setGifLoading] = useState(false);
  const [isDragOver, setIsDragOver] = useState(false);
  const [showMentions, setShowMentions] = useState(false);
  const [mentionFilter, setMentionFilter] = useState('');
  const [typingUsers, setTypingUsers] = useState([]);
  const [showMobileRooms, setShowMobileRooms] = useState(false);
  // Admin-only: list of family members + codes that already have a thread + admin-initiated new DM codes
  const [familyUsers, setFamilyUsers] = useState([]);
  const [dmThreadCodes, setDmThreadCodes] = useState([]);
  const [newDmCodes, setNewDmCodes] = useState([]);
  const [showNewDmPicker, setShowNewDmPicker] = useState(false);
  const endRef = useRef(null);
  const inputRef = useRef(null);
  // In-chat display name comes from the access code's label (e.g. "Milburn Pennybags"),
  // not the human-entered login name. Falls back if label isn't threaded through.
  const currentUser = displayName || user || 'Ella';
  const mySquad = getSquadMember(currentUser);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  // Admin: fetch family user list so we can label DM channels
  useEffect(() => {
    if (!isAdmin || !code) return;
    let mounted = true;
    (async () => {
      try {
        const res = await fetch(`${API_BASE}/api/codes`, { headers: { 'X-Admin-Code': code } });
        const data = await res.json();
        if (!mounted || !data.ok) return;
        setFamilyUsers((data.codes || []).filter(u => u.active && !u.is_admin));
      } catch {}
    })();
    return () => { mounted = false; };
  }, [isAdmin, code]);

  // Admin: poll milburn thread list (every 15s) so newly-arrived user DMs surface as channels
  useEffect(() => {
    if (!isAdmin || !code) return;
    let mounted = true;
    const poll = async () => {
      try {
        const res = await fetch(`${API_BASE}/api/messages?channel=milburn&admin=1`, { headers: { 'X-User-Code': code } });
        const data = await res.json();
        if (!mounted || !data.ok) return;
        setDmThreadCodes((data.threads || []).map(t => t.thread_for).filter(Boolean));
      } catch {}
    };
    poll();
    const iv = setInterval(poll, 15000);
    return () => { mounted = false; clearInterval(iv); };
  }, [isAdmin, code]);

  // Build the channel list -- admin gets per-user DM channels, users get a single Ask Milburn
  const labelForCode = (c) => familyUsers.find(u => u.code === c)?.label || c;
  const channels = (() => {
    const base = [
      { id: 'general', channel: 'group',  name: 'Group Chat',    icon: 'forum',        type: 'group' },
      { id: 'trades',  channel: 'alerts', name: 'Trade Alerts',  icon: 'swap_vert',    type: 'feed'  },
    ];
    if (isAdmin) {
      const codes = Array.from(new Set([...dmThreadCodes, ...newDmCodes]));
      const dms = codes.map(c => ({
        id: 'dm:' + c,
        channel: 'milburn',
        threadFor: c,
        name: labelForCode(c),
        icon: 'chat',
        type: 'dm',
      }));
      return [...base, ...dms];
    }
    return [...base, { id: 'milburn', channel: 'milburn', name: 'Ask Milburn', icon: 'support_agent', type: 'dm' }];
  })();
  const findChannel = (id) => channels.find(r => r.id === id);

  // If admin's activeRoom is stale (e.g. a dm:code that no longer exists), snap back to general
  useEffect(() => {
    if (!findChannel(activeRoom)) setActiveRoom('general');
  }, [activeRoom, channels.length]);

  const isDmRoom = activeRoom.startsWith('dm:');
  const currentDmCode = isDmRoom ? activeRoom.slice(3) : null;
  const availableDmTargets = familyUsers.filter(u => !dmThreadCodes.includes(u.code) && !newDmCodes.includes(u.code));

  // -------- Live messages: fetch from /api/messages + poll every 5s --------
  useEffect(() => {
    if (!code) return;
    let mounted = true;
    const ch = findChannel(activeRoom);
    if (!ch) return;

    const toUiMsg = (m) => ({
      id: m.id,
      user: m.author_name,
      author_code: m.author_code,
      content: m.content,
      time: new Date(m.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
      own: m.author_code === code,
      reactions: [],
      read: true,
      room: activeRoom,
      created_at: m.created_at,
      isGif: isImageContent(m.content),
    });

    const fetchMessages = async () => {
      try {
        let qs = `?channel=${ch.channel}`;
        if (ch.channel === 'milburn') {
          // threadFor is set for admin's per-user DM channels; fallback = own code (user's Ask Milburn)
          const threadFor = ch.threadFor || code;
          qs += `&thread_for=${encodeURIComponent(threadFor)}`;
        }
        const res = await fetch(`${API_BASE}/api/messages${qs}`, { headers: { 'X-User-Code': code } });
        const data = await res.json();
        if (!mounted || !data.ok) return;
        setMessages((data.messages || []).map(toUiMsg));
      } catch (e) {
        // Silent: network hiccup, next poll will retry
      } finally {
        if (mounted) setLoadingMessages(false);
      }
    };

    setLoadingMessages(true);
    fetchMessages();
    const interval = setInterval(fetchMessages, 5000);
    return () => { mounted = false; clearInterval(interval); };
  }, [activeRoom, code]);

  // Typing indicator -- will be driven by Supabase Realtime presence
  // typingUsers state is kept but only populated by real events (no fake simulation)

  // Curated GIF library -- admin-managed, kid-safe
  // These are stored locally or in Supabase Storage. Admin can add/remove via Admin panel.

  const [gifLibrary] = useState({
    'Custom Emojis': [
      { id: 'e1', tag: 'emoji', label: '100', url: 'content/gifs/Custom Emojis/100.gif' },
      { id: 'e2', tag: 'emoji', label: 'Yes', url: 'content/gifs/Custom Emojis/yes.gif' },
      { id: 'e3', tag: 'emoji', label: 'Oh Yes', url: 'content/gifs/Custom Emojis/Oh Yes.gif' },
      { id: 'e4', tag: 'emoji', label: 'Cash', url: 'content/gifs/Custom Emojis/Cash.gif' },

      { id: 'e6', tag: 'emoji', label: 'Boss Mode', url: 'content/gifs/Custom Emojis/Boss Mode.gif' },
      { id: 'e7', tag: 'emoji', label: 'Party', url: 'content/gifs/Custom Emojis/Party.gif' },

    'GIFs': [
      { id: 'g1', tag: 'gif', label: 'Stonks', url: 'content/gifs/Gifs/Stonks.gif' },

      { id: 'g5', tag: 'gif', label: 'Boom', url: 'content/gifs/Gifs/Boom.gif' },
      { id: 'g6', tag: 'gif', label: 'Day Trader', url: 'content/gifs/Gifs/Day Trader.gif' },
      { id: 'g7', tag: 'gif', label: 'To The Moon', url: 'content/gifs/Gifs/To The Moon.gif' },
      { id: 'g8', tag: 'gif', label: 'Unstoppable', url: 'content/gifs/Gifs/Unstoppable.gif' },
      { id: 'g9', tag: 'gif', label: 'Big Win', url: 'content/gifs/Gifs/Big Win.gif' },
    ],
  });

  const filteredGifs = gifSearch
    ? Object.values(gifLibrary).flat().filter(g => g.label.toLowerCase().includes(gifSearch.toLowerCase()) || g.tag.includes(gifSearch.toLowerCase()))
    : [];

  const fileInputRef = useRef(null);

  // Shared helper: post an image/GIF URL through the same pipeline as text messages.
  // Optimistic append, then POST /api/messages -- next 5s poll reconciles with the server row.
  // If the POST fails or the content is too large, we mark the optimistic bubble as failed
  // so the next poll doesn't silently wipe it.
  const postImageMessage = async (content, fileName) => {
    const ch = findChannel(activeRoom);
    if (!ch || !code) return;
    // Trade Alerts is a system feed -- users cannot post manually
    if (ch.channel === 'alerts') return;
    // Server caps content at 2000 chars. Library GIF URLs fit easily; data: URLs for
    // local uploads usually don't. Guard before a silent truncation.
    if (content.length > 2000) {
      setMessages(p => [...p, {
        id: 'err-' + Date.now(),
        user: 'System',
        content: 'That image is too large to post. Use a GIF from the library, or upload to Dropbox and paste the link.',
        time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
        own: false, reactions: [], read: true, room: activeRoom, system: true, failed: true,
      }]);
      return;
    }
    const payload = { channel: ch.channel, content };
    if (ch.channel === 'milburn') payload.thread_for = ch.threadFor || code;

    const optimisticId = 'tmp-' + Date.now();
    setMessages(p => [...p, {
      id: optimisticId, user: currentUser, author_code: code,
      content, time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
      own: true, reactions: [], read: false, room: activeRoom, pending: true, isGif: true, fileName,
    }]);
    try {
      const res = await fetch(`${API_BASE}/api/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Code': code },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error('post_failed');
    } catch (e) {
      setMessages(p => p.map(m => m.id === optimisticId ? { ...m, failed: true, pending: false } : m));
    }
  };

  // Handle file picker selection -- convert to data URL and try to post
  const handleFileSelect = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { return; }
    const reader = new FileReader();
    reader.onload = (ev) => { postImageMessage(ev.target.result, file.name); };
    reader.readAsDataURL(file);
    e.target.value = ''; // reset so same file can be selected again
  };

  // Send a GIF from the curated library. URL is short, always fits in the content cap.
  const sendGif = (gif) => {
    const content = gif.url || gif.label || 'GIF';
    postImageMessage(content, gif.label);
    setShowGifPicker(false);
    setGifSearch('');
  };

  // Drag and drop handlers for images/GIFs
  const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragOver(true); };
  const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); if (e.currentTarget === e.target) setIsDragOver(false); };
  const handleDrop = (e) => {
    e.preventDefault();
    e.stopPropagation();
    setIsDragOver(false);

    // Dropped file (image/GIF)
    const files = Array.from(e.dataTransfer?.files || []);
    const imageFile = files.find(f => f.type.startsWith('image/'));
    if (imageFile) {
      const reader = new FileReader();
      reader.onload = (ev) => { postImageMessage(ev.target.result, imageFile.name); };
      reader.readAsDataURL(imageFile);
      return;
    }

    // Dropped URL (e.g. dragging a GIF from a browser)
    const url = e.dataTransfer?.getData('text/uri-list') || e.dataTransfer?.getData('text/plain') || '';
    if (url && (url.endsWith('.gif') || url.endsWith('.png') || url.endsWith('.jpg') || url.endsWith('.jpeg') || url.endsWith('.webp'))) {
      postImageMessage(url);
    }
  };

  // Parse @mentions in message content
  const renderContent = (content) => {
    const parts = content.split(/(@[\w\s]+(?:the\s\w+)?)/g);
    return parts.map((part, i) => {
      if (part.startsWith('@')) {
        const name = part.slice(1).trim();
        const member = getSquadMember(name);
        return <span key={i} style={{ color: member.color, fontWeight: 700, cursor: 'pointer' }}>{part}</span>;
      }
      return part;
    });
  };

  // Handle @mention autocomplete
  const handleInputChange = (e) => {
    const val = e.target.value;
    setNewMsg(val);
    const lastAt = val.lastIndexOf('@');
    if (lastAt >= 0 && lastAt === val.length - 1 || (lastAt >= 0 && !val.slice(lastAt).includes(' '))) {
      setMentionFilter(val.slice(lastAt + 1).toLowerCase());
      setShowMentions(true);
    } else {
      setShowMentions(false);
    }
  };

  const insertMention = (name) => {
    const lastAt = newMsg.lastIndexOf('@');
    setNewMsg(newMsg.slice(0, lastAt) + '@' + name + ' ');
    setShowMentions(false);
    inputRef.current?.focus();
  };

  const insertEmoji = (emoji) => {
    setNewMsg(prev => prev + emoji);
    setShowQuickEmoji(false);
    inputRef.current?.focus();
  };

  const addReaction = (msgId, emoji) => {
    setMessages(prev => prev.map(m => {
      if (m.id !== msgId) return m;
      const existing = m.reactions?.find(r => r.emoji === emoji);
      if (existing) {
        if (existing.users.includes(currentUser)) {
          // Remove reaction
          const updated = { ...existing, users: existing.users.filter(u => u !== currentUser) };
          return { ...m, reactions: updated.users.length > 0 ? m.reactions.map(r => r.emoji === emoji ? updated : r) : m.reactions.filter(r => r.emoji !== emoji) };
        }
        return { ...m, reactions: m.reactions.map(r => r.emoji === emoji ? { ...r, users: [...r.users, currentUser] } : r) };
      }
      return { ...m, reactions: [...(m.reactions || []), { emoji, users: [currentUser] }] };
    }));
    setShowEmojiPicker(null);
  };

  const send = async () => {
    const content = newMsg.trim();
    if (!content) return;
    const ch = findChannel(activeRoom);
    if (!ch || !code) return;
    // Trade Alerts is a system feed -- users cannot post manually
    if (ch.channel === 'alerts') { setNewMsg(''); return; }
    const payload = { channel: ch.channel, content };
    if (ch.channel === 'milburn') {
      // Admin per-user DMs carry threadFor; users post into their own thread
      payload.thread_for = ch.threadFor || code;
    }
    // Optimistic append -- the next poll will reconcile
    const optimisticId = 'tmp-' + Date.now();
    setMessages(p => [...p, {
      id: optimisticId, user: currentUser, author_code: code,
      content, time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
      own: true, reactions: [], read: false, room: activeRoom, pending: true,
    }]);
    setNewMsg('');
    setShowMentions(false);
    try {
      await fetch(`${API_BASE}/api/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Code': code },
        body: JSON.stringify(payload),
      });
    } catch (e) {
      // Mark optimistic message as failed (leave in list with a flag)
      setMessages(p => p.map(m => m.id === optimisticId ? { ...m, failed: true, pending: false } : m));
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    if (e.key === 'Escape') { setShowMentions(false); setShowEmojiPicker(null); setShowQuickEmoji(false); }
  };

  const room = findChannel(activeRoom);
  const mentionCandidates = Object.keys(SQUAD_MEMBERS).filter(n => n !== currentUser && n.toLowerCase().includes(mentionFilter));

  const openDmWith = (userCode) => {
    if (!dmThreadCodes.includes(userCode) && !newDmCodes.includes(userCode)) {
      setNewDmCodes(prev => [...prev, userCode]);

    setActiveRoom('dm:' + userCode);
    setShowNewDmPicker(false);
    setShowMobileRooms(false);

  return (

        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span className="pulse-dot"></span>
          <span className="label-system">{Object.keys(SQUAD_MEMBERS).length} Members Online</span>
        </div>
      </div>

      <div className="chat-layout">
        {/* Rooms Panel */}
        <div className={`chat-rooms-panel ${showMobileRooms ? 'mobile-open' : ''}`}>

            {isAdmin && availableDmTargets.length > 0 && (
              <button onClick={() => setShowNewDmPicker(s => !s)} title="New DM"
                style={{ background: 'none', border: '1px solid rgba(243,156,18,0.3)', color: '#f39c12', borderRadius: 'var(--radius-full)', width: 26, height: 26, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', padding: 0 }}>
                <Icon name={showNewDmPicker ? 'close' : 'add'} size={14} />
              </button>
            )}
          </div>
          <div className="chat-rooms-list">
            {channels.map(r => {
              const isDm = r.type === 'dm';
              const preview = r.id === 'general' ? 'Group chat'
                : r.id === 'trades' ? 'Live trade feed'
                : isAdmin && isDm ? 'Private DM'
                : 'Your DM with Milburn';
              const avatar = isDm && isAdmin ? (
                <span style={{ fontSize: 18 }}>💬</span>
              ) : isDm ? (
                <span style={{ fontSize: 18 }}>🎩</span>
              ) : (
                <Icon name={r.icon} size={18} />

              return (
                <button key={r.id} className={`chat-room-item ${activeRoom === r.id ? 'active' : ''}`} onClick={() => { setActiveRoom(r.id); setShowMobileRooms(false); }}>
                  <div className="chat-room-icon" style={isDm ? { background: 'rgba(243,156,18,0.15)' } : {}}>

            {isAdmin && showNewDmPicker && (
              <div style={{ padding: '10px 14px', background: 'var(--surface-container-high)', borderTop: '1px solid rgba(73,72,71,0.08)', borderBottom: '1px solid rgba(73,72,71,0.08)' }}>

        {/* Main Chat */}
