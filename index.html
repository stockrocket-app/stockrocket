            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 36, height: 36, borderRadius: 'var(--radius-lg)', background: (room?.type === 'dm') ? 'rgba(243,156,18,0.15)' : 'rgba(0,255,163,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {room?.type === 'dm' ? <span style={{ fontSize: 20 }}>{isAdmin && isDmRoom ? '💬' : '🎩'}</span> : <Icon name={room?.icon || 'forum'} size={20} className="text-primary" />}
                </div>
                <div>
                  <div style={{ fontFamily: 'var(--font-headline)', fontWeight: 700, fontSize: 15 }}>{room?.name || 'Group Chat'}</div>
                  <div className="text-muted" style={{ fontSize: 11 }}>
                    {activeRoom === 'general' && 'Group chat'}
                    {activeRoom === 'trades' && 'Trades post here automatically'}
                    {activeRoom === 'milburn' && !isAdmin && 'Private DM with Milburn Pennybags'}

                  </div>

              <button className="header-icon-btn"><Icon name="search" /></button>
              <button className="header-icon-btn"><Icon name="push_pin" /></button>
              <button className="header-icon-btn"><Icon name="more_vert" /></button>
            </div>
          </div>

          {/* Squad avatars strip -- only in Group Chat */}
          {activeRoom === 'general' && (
            <div style={{ padding: '8px 24px 12px', display: 'flex', alignItems: 'center', gap: 8, borderBottom: '1px solid rgba(73,72,71,0.05)' }}>
              {Object.entries(SQUAD_MEMBERS).map(([name, m]) => (
                <div key={name} title={name} style={{ position: 'relative', flexShrink: 0 }}>
                  <CharacterAvatar name={name} size={46} style={{ border: name === currentUser ? `2px solid ${m.color}` : '2px solid transparent' }} />
                  <div style={{ position: 'absolute', bottom: 0, right: 0, width: 10, height: 10, borderRadius: '50%', background: '#00ffa3', border: '2px solid var(--bg)' }}></div>

          {/* Trade Alerts Feed -- live from stockrocket_messages, channel='alerts' */}
          {activeRoom === 'trades' && (

                </div>

              {isAdmin && isDmRoom && (
                <div style={{ textAlign: 'center', padding: '24px 0 16px' }}>
                  <CharacterAvatar name={labelForCode(currentDmCode)} size={72} style={{ display: 'inline-flex', marginBottom: 10, borderRadius: 'var(--radius-xl)' }} />
                  <h3 style={{ fontFamily: 'var(--font-headline)', fontSize: 15, fontWeight: 700 }}>{labelForCode(currentDmCode)}</h3>
                  <p className="text-muted" style={{ fontSize: 11 }}>Private DM {'\u00B7'} only you and them see this</p>

              {!loadingMessages && messages.length === 0 && isAdmin && isDmRoom && (

                  <p className="text-muted" style={{ fontSize: 12, maxWidth: 360, margin: '0 auto' }}>No messages yet. Say hi as Milburn to start the conversation.</p>

              {/* Milburn DM messages */}
              {messages.map(m => {
                const member = getSquadMember(m.user);
                return (
                  <div key={m.id} className={`chat-message ${m.own ? 'own' : ''}`}>
                    <CharacterAvatar name={m.user} size={44} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>

                      {m.isGif ? (
                        <div style={{ borderRadius: 'var(--radius-xl)', overflow: 'hidden', maxWidth: 300 }}>
                          <img src={m.content} alt="GIF" style={{ width: '100%', maxHeight: 240, objectFit: 'cover', borderRadius: 'var(--radius-lg)', display: 'block' }} />
                        </div>
                      ) : (
                        <div className="chat-msg-bubble">{renderContent(m.content)}</div>
                      )}
                      <div className="chat-msg-time">{m.time}</div>
                    </div>
                  </div>
                );
              })}
              <div ref={endRef} />
            </div>
          )}

          {/* Group Chat Messages */}
          {activeRoom === 'general' && (
          <div className="chat-messages" onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop} style={isDragOver ? { outline: '2px dashed var(--primary-fixed)', outlineOffset: -4, background: 'rgba(0,255,163,0.03)' } : {}}>
            {isDragOver && (
              <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 10, background: 'rgba(14,14,14,0.8)', borderRadius: 'var(--radius-xl)' }}>
                <div style={{ textAlign: 'center' }}>
                  <Icon name="gif_box" size={48} className="text-primary" />
                  <p style={{ fontFamily: 'var(--font-headline)', fontSize: 16, fontWeight: 700, marginTop: 12 }}>Drop GIF or Image here</p>
                  <p className="text-muted" style={{ fontSize: 12, marginTop: 4 }}>Supports .gif, .png, .jpg, .webp</p>
                </div>
              </div>
            )}
            {messages.map(m => {
              const member = getSquadMember(m.user);
              return (
                <div key={m.id} className={`chat-message ${m.own ? 'own' : ''}`} style={{ position: 'relative' }}
                  onMouseEnter={() => {}} >

                  {/* Avatar */}
                  <CharacterAvatar name={m.user} size={52} />

                  <div style={{ flex: 1, minWidth: 0 }}>
                    {/* Name + time row */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                      {!m.own && <span style={{ fontFamily: 'var(--font-headline)', fontSize: 12, fontWeight: 700, color: member.color, textTransform: 'uppercase', letterSpacing: '0.1em' }}>{m.user}</span>}
                      {m.own && <span style={{ fontFamily: 'var(--font-headline)', fontSize: 12, fontWeight: 700, color: member.color, textTransform: 'uppercase', letterSpacing: '0.1em' }}>{m.user}</span>}
                    </div>

                    {/* Bubble -- text or GIF */}
                    {m.isGif ? (
                      <div style={{ borderRadius: 'var(--radius-xl)', overflow: 'hidden', maxWidth: 300 }}>
                        <img src={m.content} alt={m.fileName || 'GIF'} style={{ width: '100%', maxHeight: 240, objectFit: 'cover', borderRadius: 'var(--radius-lg)', display: 'block' }} onError={e => { e.target.style.display = 'none'; }} />
                        {m.fileName && <div style={{ fontSize: 10, color: 'var(--outline)', marginTop: 4 }}>{m.fileName}</div>}
                      </div>
                    ) : (
                      <div className="chat-msg-bubble" style={m.own ? {} : {}}>
                        {renderContent(m.content)}
                      </div>
                    )}

                    {/* Reactions */}
                    {m.reactions && m.reactions.length > 0 && (
                      <div style={{ display: 'flex', gap: 4, marginTop: 6, flexWrap: 'wrap' }}>
                        {m.reactions.map((r, ri) => (
                          <button key={ri} onClick={() => addReaction(m.id, r.emoji)}
                            style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '3px 8px', borderRadius: 'var(--radius-full)', background: r.users.includes(currentUser) ? 'rgba(0,255,163,0.15)' : 'var(--surface-container-highest)', border: r.users.includes(currentUser) ? '1px solid rgba(0,255,163,0.3)' : '1px solid transparent', cursor: 'pointer', transition: 'all 0.15s' }}>
                            <ReactionEmoji emoji={r.emoji} size={18} /> <span style={{ fontSize: 10, fontFamily: 'var(--font-headline)', fontWeight: 700, color: 'var(--on-surface-variant)' }}>{r.users.length}</span>
                          </button>
                        ))}
                        <button onClick={() => setShowEmojiPicker(showEmojiPicker === m.id ? null : m.id)}
                          style={{ width: 24, height: 24, borderRadius: 'var(--radius-full)', background: 'var(--surface-container-highest)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, color: 'var(--on-surface-variant)', transition: 'all 0.15s' }}>+</button>
                      </div>
                    )}

                    {/* Time + read receipts */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 4 }}>
                      <span className="chat-msg-time">{m.time}</span>
                      {m.own && <span style={{ color: m.read ? 'var(--primary-fixed)' : 'var(--outline)', fontSize: 12 }}>{'\u2713\u2713'}</span>}
                      {!m.own && m.reactions?.length === 0 && (
                        <button onClick={() => setShowEmojiPicker(showEmojiPicker === m.id ? null : m.id)}
                          style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, color: 'var(--outline)', padding: 0, opacity: 0.5 }}>
                          <Icon name="add_reaction" size={14} />
                        </button>
                      )}
                    </div>

                    {/* Emoji picker for reactions */}
                    {showEmojiPicker === m.id && (
                      <div style={{ display: 'flex', gap: 2, flexWrap: 'wrap', marginTop: 6, padding: 8, background: 'var(--surface-container-high)', borderRadius: 'var(--radius-lg)', border: '1px solid rgba(73,72,71,0.1)', maxWidth: 300 }}>
                        {CUSTOM_REACTION_EMOJIS.map(ce => (
                          <button key={ce.id} onClick={() => addReaction(m.id, ce.id)} title={ce.label}
                            style={{ width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', padding: 2, transition: 'background 0.1s' }}
                            onMouseEnter={e2 => e2.currentTarget.style.background = 'var(--surface-container-highest)'} onMouseLeave={e2 => e2.currentTarget.style.background = 'none'}>
                            <img src={ce.url} alt={ce.label} style={{ width: 24, height: 24, objectFit: 'contain' }} />
                          </button>
                        ))}
                        <div style={{ width: '100%', height: 1, background: 'rgba(73,72,71,0.1)', margin: '4px 0' }}></div>
                        {QUICK_EMOJIS.map(e => (
                          <button key={e} onClick={() => addReaction(m.id, e)}
                            style={{ width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontSize: 18, transition: 'background 0.1s' }}
                            onMouseEnter={e2 => e2.currentTarget.style.background = 'var(--surface-container-highest)'} onMouseLeave={e2 => e2.currentTarget.style.background = 'none'}>
                            {e}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
            <div ref={endRef} />
          </div>
          )}

          {/* Typing indicator */}
          {typingUsers.length > 0 && (
            <div style={{ padding: '4px 24px 0', display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ display: 'flex', gap: 3 }}>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--primary-fixed)', animation: 'pulse 1s ease-in-out infinite' }}></span>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--primary-fixed)', animation: 'pulse 1s ease-in-out 0.2s infinite' }}></span>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--primary-fixed)', animation: 'pulse 1s ease-in-out 0.4s infinite' }}></span>
              </div>
              <span className="label-system" style={{ fontSize: 10 }}>{typingUsers.join(', ')} is typing...</span>
            </div>
          )}

          {/* @mention autocomplete */}
          {showMentions && mentionCandidates.length > 0 && (
            <div style={{ padding: '0 24px', marginBottom: -8 }}>
              <div style={{ background: 'var(--surface-container-high)', borderRadius: 'var(--radius-lg)', border: '1px solid rgba(73,72,71,0.1)', overflow: 'hidden' }}>
                {mentionCandidates.map(name => {
                  const m = getSquadMember(name);
                  return (
                    <button key={name} onClick={() => insertMention(name)}
                      style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 16px', width: '100%', background: 'none', border: 'none', borderBottom: '1px solid rgba(73,72,71,0.05)', cursor: 'pointer', color: 'var(--on-surface)', textAlign: 'left', transition: 'background 0.1s' }}
                      onMouseEnter={e => e.target.style.background = 'rgba(0,255,163,0.05)'} onMouseLeave={e => e.target.style.background = 'none'}>
                      <span style={{ fontSize: 20 }}>{m.emoji}</span>
                      <div>
                        <div style={{ fontFamily: 'var(--font-headline)', fontSize: 13, fontWeight: 600 }}>{name}</div>
                        <div style={{ fontSize: 10, color: 'var(--on-surface-variant)' }}>{m.strategy}</div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* GIF Library Panel -- curated, kid-safe */}
          {showGifPicker && (
            <div style={{ borderTop: '1px solid rgba(73,72,71,0.05)', padding: 16, background: 'var(--surface-container-low)', maxHeight: '50vh', overflowY: 'auto' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                <div className="input-with-icon" style={{ flex: 1 }}>
                  <Icon name="search" />
                  <input className="input-field" placeholder="Search GIF library..." value={gifSearch} onChange={e => setGifSearch(e.target.value)} style={{ padding: '8px 12px 8px 36px', fontSize: 12 }} autoFocus />
                </div>
                <button className="header-icon-btn" onClick={() => { setShowGifPicker(false); setGifSearch(''); }}><Icon name="close" size={18} /></button>
              </div>
              <div>
                {/* Search results */}
                {gifSearch && filteredGifs.length > 0 && (
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                    {filteredGifs.map(g => (
                      <button key={g.id} onClick={() => sendGif(g)}
                        style={{ padding: 4, background: 'var(--surface-container-highest)', borderRadius: 'var(--radius-lg)', border: '1px solid rgba(73,72,71,0.1)', cursor: 'pointer', textAlign: 'center', transition: 'all 0.15s', overflow: 'hidden', width: g.tag === 'emoji' ? 44 : 120 }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(0,255,163,0.3)'; e.currentTarget.style.transform = 'scale(1.08)'; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(73,72,71,0.1)'; e.currentTarget.style.transform = 'scale(1)'; }}>
                        <img src={g.url} alt={g.label} style={{ width: '100%', height: g.tag === 'emoji' ? 36 : 68, objectFit: g.tag === 'emoji' ? 'contain' : 'cover', display: 'block', borderRadius: 4 }} />
                        <div style={{ fontSize: 8, fontFamily: 'var(--font-headline)', fontWeight: 600, color: 'var(--on-surface-variant)', marginTop: 2 }}>{g.label}</div>
                      </button>
                    ))}
                  </div>
                )}
                {gifSearch && filteredGifs.length === 0 && (
                  <div style={{ textAlign: 'center', padding: 20 }}><span className="text-muted" style={{ fontSize: 12 }}>No matching GIFs. Try a different search or upload your own!</span></div>
                )}

                {/* Browse by category (no search) */}
                {!gifSearch && Object.entries(gifLibrary).map(([category, gifs]) => (
                  <div key={category} style={{ marginBottom: 16 }}>
                    <p className="label-system" style={{ fontSize: 10, marginBottom: 8 }}>{category}</p>
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      {gifs.map(g => (
                        <button key={g.id} onClick={() => sendGif(g)}
                          style={{ padding: 4, background: 'var(--surface-container-highest)', borderRadius: category === 'Custom Emojis' ? 'var(--radius-md)' : 'var(--radius-lg)', border: '1px solid rgba(73,72,71,0.1)', cursor: 'pointer', textAlign: 'center', transition: 'all 0.15s', overflow: 'hidden', width: category === 'Custom Emojis' ? 44 : 120 }}
                          onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(0,255,163,0.3)'; e.currentTarget.style.transform = 'scale(1.08)'; }}
                          onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(73,72,71,0.1)'; e.currentTarget.style.transform = 'scale(1)'; }}>
                          <img src={g.url} alt={g.label} style={{ width: '100%', height: category === 'Custom Emojis' ? 36 : 68, objectFit: category === 'Custom Emojis' ? 'contain' : 'cover', display: 'block', borderRadius: 4 }} />
                          {category !== 'Custom Emojis' && <div style={{ fontSize: 8, fontFamily: 'var(--font-headline)', fontWeight: 600, color: 'var(--on-surface-variant)', marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{g.label}</div>}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}

                {/* Upload your own */}
                <div style={{ textAlign: 'center', padding: 16, borderTop: '1px solid rgba(73,72,71,0.05)', marginTop: 8 }}>
                  <button className="btn btn-ghost" onClick={() => { fileInputRef.current?.click(); setShowGifPicker(false); }}>
                    <Icon name="upload" size={16} /> Upload Your Own GIF
                  </button>
                  <p className="text-muted" style={{ fontSize: 10, marginTop: 4 }}>Admin can add GIFs to the library from the Command Center</p>
                </div>
              </div>
            </div>
          )}

          {/* Input bar -- hidden for Trade Alerts feed + for admin on Milburn channel (inbox has per-thread reply boxes) */}
          {activeRoom !== 'trades' && <div className="chat-input-bar" style={{ position: 'relative' }}>
            <input ref={fileInputRef} type="file" accept="image/*,.gif" style={{ display: 'none' }} onChange={handleFileSelect} />
            <button className="header-icon-btn" style={{ width: 32, height: 32, flexShrink: 0 }} title="Upload" onClick={() => fileInputRef.current?.click()}><Icon name="attach_file" size={18} /></button>
            <button className="header-icon-btn" style={{ width: 32, height: 32, flexShrink: 0, color: showGifPicker ? 'var(--primary-fixed)' : undefined }} title="GIF" onClick={() => { setShowGifPicker(!showGifPicker); setShowQuickEmoji(false); }}><Icon name="gif_box" size={18} /></button>
            <input ref={inputRef} className="chat-input" placeholder="Type a message..." value={newMsg} onChange={handleInputChange} onKeyDown={handleKey} style={{ flex: 1 }} />
            <button className="header-icon-btn" style={{ width: 32, height: 32, flexShrink: 0, color: showQuickEmoji ? 'var(--primary-fixed)' : undefined }} title="Emoji" onClick={() => { setShowQuickEmoji(!showQuickEmoji); setShowGifPicker(false); }}><Icon name="mood" size={18} /></button>
            <button className="chat-send-btn" onClick={send}><Icon name="send" size={18} /></button>

            {/* Quick emoji picker for input */}
            {showQuickEmoji && (
              <div style={{ position: 'absolute', bottom: '100%', right: 60, marginBottom: 8, padding: 12, background: 'var(--surface-container-high)', borderRadius: 'var(--radius-xl)', border: '1px solid rgba(73,72,71,0.1)', display: 'flex', gap: 4, flexWrap: 'wrap', maxWidth: 280, boxShadow: '0 8px 32px rgba(0,0,0,0.3)' }}>
                {QUICK_EMOJIS.map(e => (
                  <button key={e} onClick={() => insertEmoji(e)}
                    style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontSize: 20, transition: 'background 0.1s' }}
                    onMouseEnter={e2 => e2.target.style.background = 'var(--surface-container-highest)'} onMouseLeave={e2 => e2.target.style.background = 'none'}>
                    {e}
                  </button>
                ))}
              </div>
            )}
          </div>}
        </div>
      </div>
    </div>
  );
}

// ==================== ACADEMY ====================
// Helper: render markdown-style bold
function renderBold(text) {
  if (!text) return null;
  return text.split(/\*\*(.*?)\*\*/g).map((part, i) =>
    i % 2 === 1 ? <strong key={i} style={{ color: 'var(--on-surface)', fontWeight: 700 }}>{part}</strong> : part
  );
}

// Lesson viewer -- full page for a single lesson
function LessonPage({ lesson, onBack, onNext }) {
  useEffect(() => { window.scrollTo(0, 0); document.querySelector('.main-content')?.scrollTo(0, 0); }, []);
  const lc = { Beginner: 'badge-primary', Intermediate: 'badge-secondary', Advanced: 'badge-error' };

  return (
    <div>
      {/* Hero */}
      <div className="kinetic-bg" style={{ padding: 'clamp(40px, 8vw, 80px) 0' }}>
        <button className="btn btn-secondary btn-sm" onClick={onBack} style={{ marginBottom: 32 }}>
          <Icon name="arrow_back" size={16} /> Back to Lessons
        </button>
        <p className="label-system" style={{ marginBottom: 12 }}>Module {String(lesson.number).padStart(2, '0')} {'\u00B7'} {lesson.module}</p>
        <h1 style={{ fontFamily: 'Georgia, serif', fontSize: 'clamp(32px, 6vw, 72px)', fontWeight: 700, lineHeight: 1.1, marginBottom: 16 }}>
          Lesson {lesson.number}:<br />{lesson.title}
        </h1>
        <p className="text-muted" style={{ fontSize: 'clamp(16px, 2vw, 22px)', lineHeight: 1.6 }}>{lesson.subtitle}</p>
        <div style={{ display: 'flex', gap: 8, marginTop: 20 }}>
          <span className={`badge ${lc[lesson.level]}`}>{lesson.level}</span>
          <span className="badge badge-neutral"><Icon name="schedule" size={12} /> {lesson.duration}</span>
        </div>
      </div>

      {/* Sections */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 48, padding: '48px 0' }}>
        {lesson.sections.map((s, i) => {
          if (s.type === 'concept') return (
            <div key={i} className="card" style={{ padding: 'clamp(24px, 4vw, 48px)' }}>
              <div className="two-col" style={{ alignItems: 'center' }}>
                <div>
                  <div className="stat-icon primary" style={{ width: 48, height: 48, marginBottom: 20 }}><Icon name={s.icon} size={24} /></div>
                  <h2 style={{ fontFamily: 'Georgia, serif', fontSize: 'clamp(28px, 4vw, 40px)', fontWeight: 700, marginBottom: 20 }}>{s.title}</h2>
                  {s.body.split('\n\n').map((p, pi) => <p key={pi} style={{ fontSize: 20, lineHeight: 1.8, color: 'var(--on-surface-variant)', marginBottom: 16 }}>{renderBold(p)}</p>)}
                </div>
                {s.quote && (
                  <div style={{ padding: 'clamp(20px, 3vw, 40px)', background: 'var(--surface-container-low)', borderRadius: 'var(--radius-xl)', border: '1px solid rgba(73,72,71,0.1)' }}>
                    <p className="label-system" style={{ marginBottom: 12, color: 'var(--primary-fixed)' }}>{s.quote.label}</p>
                    <p style={{ fontFamily: 'Georgia, serif', fontSize: 'clamp(18px, 2.5vw, 28px)', fontStyle: 'italic', lineHeight: 1.4 }}>{s.quote.text}</p>
                  </div>
                )}
              </div>
            </div>
          );

          if (s.type === 'two-column') return (
            <div key={i} className="two-col">
              {s.cards.map((c, ci) => (
                <div key={ci} className="card" style={{ padding: 'clamp(24px, 3vw, 40px)' }}>
                  <div className="stat-icon primary" style={{ width: 48, height: 48, marginBottom: 20 }}><Icon name={c.icon} size={24} /></div>
                  <h3 style={{ fontFamily: 'Georgia, serif', fontSize: 'clamp(24px, 3vw, 36px)', fontWeight: 700, marginBottom: 20 }}>{c.title}</h3>
                  {c.body && <p style={{ fontSize: 20, lineHeight: 1.8, color: 'var(--on-surface-variant)', marginBottom: 20 }}>{renderBold(c.body)}</p>}
                  {c.bullets && c.bullets.map((b, bi) => (
                    <div key={bi} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '10px 0' }}>
                      <Icon name="check_circle" size={22} className="text-primary" style={{ flexShrink: 0, marginTop: 2 }} />
                      <span style={{ fontSize: 18, lineHeight: 1.6 }}>{renderBold(b)}</span>
                    </div>
                  ))}
                  {c.numbered && c.numbered.map((n, ni) => (
                    <div key={ni} style={{ padding: '14px 0', borderTop: ni > 0 ? '1px solid rgba(73,72,71,0.08)' : 'none', marginTop: ni > 0 ? 12 : 0 }}>
                      <p style={{ fontSize: 14, fontWeight: 700, color: 'var(--primary-fixed)', textTransform: 'uppercase', letterSpacing: '0.15em', marginBottom: 8 }}>{ni + 1}. {n.label}</p>
                      <p style={{ fontSize: 18, lineHeight: 1.7, color: 'var(--on-surface-variant)' }}>{n.text}</p>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          );

          if (s.type === 'summary') return (
            <div key={i} style={{ padding: '48px 0', borderTop: '1px solid rgba(73,72,71,0.08)', borderBottom: '1px solid rgba(73,72,71,0.08)', textAlign: 'center' }}>
              <p className="label-system" style={{ marginBottom: 16, color: 'var(--primary-fixed)' }}>Quick Summary</p>
              <p style={{ fontFamily: 'Georgia, serif', fontSize: 'clamp(20px, 3vw, 36px)', fontStyle: 'italic', lineHeight: 1.4 }}>
                "{renderBold(s.text)}"
              </p>
            </div>
          );
          return null;
        })}

        {/* Next Lesson */}
        <div style={{ padding: '32px 0' }}>
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            {lesson.nextLesson && <button className="btn btn-primary" onClick={() => onNext(lesson.nextLesson)}>Continue to Lesson {lesson.number + 1} <Icon name="arrow_forward" size={16} /></button>}
            <button className="btn btn-secondary" onClick={onBack}><Icon name="grid_view" size={16} /> All Lessons</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Academy page -- lesson list + lesson viewer
function LearnPage() {
  const [activeLesson, setActiveLesson] = useState(null);
  const lc = { Beginner: 'badge-primary', Intermediate: 'badge-secondary', Advanced: 'badge-error' };

  if (activeLesson) {
    const lesson = ACADEMY_LESSONS.find(l => l.id === activeLesson);
    if (lesson) return <LessonPage key={lesson.id} lesson={lesson} onBack={() => setActiveLesson(null)} onNext={(id) => { setActiveLesson(id); }} />;
  }

  return (
    <div>
      <div style={{ textAlign: 'center', marginBottom: 48, padding: '40px 0' }}>
        <p className="label-system" style={{ marginBottom: 16 }}>Learning_Module</p>

// ==================== ACCESS CODES ADMIN ====================
// Supabase-backed CRUD for access codes. Admin endpoint requires the admin's own
// code in the X-Admin-Code header. Component handles list / create / deactivate /
// reactivate / reset-uses / delete, plus a recent audit log view.
function AccessCodesAdmin({ adminCode, setNotification }) {
  const [users, setUsers] = useState(null); // null = loading
  const [log, setLog] = useState([]);
  const [showLog, setShowLog] = useState(false);
  const [error, setError] = useState('');
  const [creating, setCreating] = useState(false);
  const [form, setForm] = useState({ label: '', email: '', code: '', is_admin: false });
  const [revealed, setRevealed] = useState({}); // { [code]: true } -- show password in plaintext
  const [editing, setEditing] = useState(null); // { code, field, value }

  const authHeaders = { 'Content-Type': 'application/json', 'X-Admin-Code': adminCode };

  const fetchUsers = useCallback(async () => {
    setError('');
    try {
      const res = await fetch(`${API_BASE}/api/codes`, { headers: { 'X-Admin-Code': adminCode } });
      const data = await res.json();
      if (!res.ok || !data.ok) { setError(data.error || 'Failed to load users'); setUsers([]); return; }
      setUsers(data.codes || []);
    } catch (e) {
      setError('Network error -- is the admin endpoint deployed?');
      setUsers([]);
    }
  }, [adminCode]);

  const fetchLog = useCallback(async () => {
    try {
      const res = await fetch(`${API_BASE}/api/codes?log=1`, { headers: { 'X-Admin-Code': adminCode } });
      const data = await res.json();
      if (res.ok && data.ok) setLog(data.log || []);
    } catch {}
  }, [adminCode]);

  useEffect(() => { fetchUsers(); }, [fetchUsers]);

  const submitCreate = async (e) => {
    e.preventDefault();
    setError('');
    if (!form.label.trim()) { setError('Name is required'); return; }
    if (form.code.length < 4) { setError('Password must be at least 4 characters'); return; }
    setCreating(true);
    try {
      const payload = {
        code: form.code,
        label: form.label.trim(),
        email: form.email.trim() || null,
        tier: 'family',
        is_admin: form.is_admin,
        uses_max: 9999,
      };
      const res = await fetch(`${API_BASE}/api/codes`, { method: 'POST', headers: authHeaders, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok || data.error) { setError(data.detail || data.error || 'Create failed'); return; }
      setNotification({ type: 'success', message: `User "${payload.label}" created` });
      setForm({ label: '', email: '', code: '', is_admin: false });
      fetchUsers();
    } finally {
      setCreating(false);
    }
  };

  const patchUser = async (code, body) => {
    const res = await fetch(`${API_BASE}/api/codes`, { method: 'PATCH', headers: authHeaders, body: JSON.stringify({ code, ...body }) });
    const data = await res.json();
    if (!res.ok || data.error) {
      setNotification({ type: 'error', message: data.detail || data.error || 'Update failed' });
      return false;
    }
    return true;
  };

  const toggleActive = async (code, active) => {
    if (await patchUser(code, { active })) fetchUsers();
  };

  const changePassword = async (currentCode, label) => {
    const next = prompt(`New password for ${label || currentCode}?\n(4-64 characters, no spaces, case-sensitive)`);
    if (!next) return;
    if (await patchUser(currentCode, { new_code: next })) {
      setNotification({ type: 'success', message: `Password updated for ${label || currentCode}` });
      fetchUsers();
    }
  };

  const changeEmail = async (code, currentEmail, label) => {
    const next = prompt(`Email for ${label || code}? (leave blank to remove)`, currentEmail || '');
    if (next === null) return;
    if (await patchUser(code, { email: next })) {
      setNotification({ type: 'success', message: `Email updated` });
      fetchUsers();
    }
  };

  const changeName = async (code, currentLabel) => {
    const next = prompt('Name?', currentLabel || '');
    if (next === null) return;
    if (!next.trim()) return setNotification({ type: 'error', message: 'Name cannot be blank' });
    if (await patchUser(code, { label: next.trim() })) {
      setNotification({ type: 'success', message: `Name updated` });
      fetchUsers();
    }
  };

  const deleteUser = async (code, label) => {
    if (!confirm(`Delete ${label || code}? They lose access immediately.`)) return;
    await fetch(`${API_BASE}/api/codes?code=${encodeURIComponent(code)}`, { method: 'DELETE', headers: authHeaders });
    setNotification({ type: 'success', message: `Deleted ${label || code}` });
    fetchUsers();
  };

  const copy = async (value, thing = 'value') => {
    try { await navigator.clipboard.writeText(value); setNotification({ type: 'success', message: `Copied ${thing}` }); } catch {}
  };

  const toggleReveal = (code) => setRevealed(r => ({ ...r, [code]: !r[code] }));

  if (users === null) {
    return <div className="card"><p className="text-muted">Loading users...</p></div>;
  }

  return (
    <div>
      {error && <div className="card" style={{ borderColor: 'var(--error)', marginBottom: 16 }}>
        <p style={{ color: 'var(--error)', fontSize: 13 }}>{error}</p>

// ==================== MILBURN INBOX ====================
// Admin-only reply surface for the "Ask Milburn" DM channel.
// GET  /api/messages?channel=milburn&admin=1         -> all threads, grouped by thread_for
// POST /api/messages { channel:'milburn', thread_for, content }  -> replies as admin
function MilburnInbox({ adminCode, setNotification }) {
  const [threads, setThreads] = useState([]);
  const [activeThread, setActiveThread] = useState(null);
  const [reply, setReply] = useState('');
  const [loading, setLoading] = useState(true);
  const [sending, setSending] = useState(false);
  const [users, setUsers] = useState([]);     // All active access codes (for starting new DMs)
  const [showNewDm, setShowNewDm] = useState(false);
  const endRef = useRef(null);

  // Load + poll threads every 5s
  useEffect(() => {
    if (!adminCode) return;
    let mounted = true;
    const load = async () => {
      try {
        const res = await fetch(`${API_BASE}/api/messages?channel=milburn&admin=1`, { headers: { 'X-User-Code': adminCode } });
        const data = await res.json();
        if (!mounted || !data.ok) return;
        setThreads(data.threads || []);
        // Auto-select first thread on initial load
        setActiveThread(prev => prev || (data.threads?.[0]?.thread_for) || null);
      } catch {}
      finally { if (mounted) setLoading(false); }
    };
    load();
    const iv = setInterval(load, 5000);
    return () => { mounted = false; clearInterval(iv); };
  }, [adminCode]);

  // Load full user list once (so admin can start a thread with anyone, not just people who have already messaged)
  useEffect(() => {
    if (!adminCode) return;
    let mounted = true;
    (async () => {
      try {
        const res = await fetch(`${API_BASE}/api/codes`, { headers: { 'X-Admin-Code': adminCode } });
        const data = await res.json();
        if (!mounted || !data.ok) return;
        setUsers((data.codes || []).filter(u => u.active && !u.is_admin));
      } catch {}
    })();
    return () => { mounted = false; };
  }, [adminCode]);

  // Start (or jump to) a private thread with the given user.
  // If no thread exists yet, create a placeholder so the admin can type the first message.
  const openThreadWith = (userCode) => {
    setShowNewDm(false);
    setThreads(prev => {
      if (prev.some(t => t.thread_for === userCode)) return prev;
      return [{ thread_for: userCode, messages: [], last_at: new Date().toISOString() }, ...prev];
    });
    setActiveThread(userCode);
  };

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [activeThread, threads]);

  const current = threads.find(t => t.thread_for === activeThread);

  const sendReply = async () => {
    const content = reply.trim();
    if (!content || !activeThread || sending) return;
    setSending(true);
    try {
      const res = await fetch(`${API_BASE}/api/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Code': adminCode },
        body: JSON.stringify({ channel: 'milburn', thread_for: activeThread, content }),
      });
      const data = await res.json();
      if (data.ok) {
        setReply('');
        // Optimistically append so the admin sees it before next poll
        setThreads(prev => prev.map(t => t.thread_for === activeThread ? { ...t, messages: [...t.messages, data.message], last_at: data.message.created_at } : t));
      } else {
        setNotification?.({ type: 'error', message: 'Reply failed: ' + (data.error || 'unknown') });
      }
    } catch (e) {
      setNotification?.({ type: 'error', message: 'Network error' });
    } finally { setSending(false); }
  };

  const formatTime = (iso) => {
    try {
      const d = new Date(iso);
      const now = new Date();
      if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } catch { return ''; }
  };

  const labelFor = (userCode) => users.find(u => u.code === userCode)?.label || userCode;
  const availableForNew = users.filter(u => !threads.some(t => t.thread_for === u.code));

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, marginBottom: 12 }}>
        <div>
          <h3 className="section-title" style={{ marginBottom: 6 }}><Icon name="support_agent" size={20} /> Milburn_Inbox</h3>
          <p className="text-muted" style={{ fontSize: 13, margin: 0 }}>Every "Ask Milburn" DM lands here. Start a private thread with any family member to talk 1:1.</p>
        </div>
        <button className="btn btn-primary" onClick={() => setShowNewDm(s => !s)} style={{ flexShrink: 0, whiteSpace: 'nowrap' }}>
          <Icon name={showNewDm ? 'close' : 'add'} size={16} /> {showNewDm ? 'Cancel' : 'New DM'}
        </button>
      </div>

      {showNewDm && (
        <div className="card" style={{ padding: 16, marginBottom: 16 }}>
          <div style={{ fontFamily: 'var(--font-headline)', fontSize: 13, fontWeight: 700, marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Start a private DM</div>
          {users.length === 0 && <div className="text-muted" style={{ fontSize: 12 }}>No family members yet. Add one in Command Center &rarr; Users.</div>}
          {users.length > 0 && availableForNew.length === 0 && <div className="text-muted" style={{ fontSize: 12 }}>You already have a thread with every active family member.</div>}
          {availableForNew.length > 0 && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 8 }}>
              {availableForNew.map(u => (
                <button key={u.code} onClick={() => openThreadWith(u.code)}
                  style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: 'var(--surface-container-highest)', border: '1px solid rgba(73,72,71,0.08)', borderRadius: 'var(--radius-lg)', cursor: 'pointer', textAlign: 'left' }}>
                  <div style={{ width: 32, height: 32, borderRadius: 'var(--radius-lg)', background: 'rgba(243,156,18,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <span style={{ fontSize: 14 }}>💬</span>
                  </div>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div style={{ fontFamily: 'var(--font-headline)', fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{u.label || u.code}</div>
                    <div className="text-muted" style={{ fontSize: 11, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{u.code}</div>
                  </div>
                </button>
              ))}
            </div>
          )}
        </div>
      )}

      {loading && threads.length === 0 && (
        <div className="card" style={{ padding: 48, textAlign: 'center' }}>
          <span className="text-muted" style={{ fontSize: 13 }}>Loading threads...</span>
        </div>
      )}
      {!loading && threads.length === 0 && !showNewDm && (
        <div className="card" style={{ padding: 48, textAlign: 'center' }}>
          <div style={{ fontSize: 40, marginBottom: 12, opacity: 0.4 }}>📭</div>
          <div style={{ fontFamily: 'var(--font-headline)', fontSize: 15, fontWeight: 700, marginBottom: 6 }}>No DMs yet</div>
          <div className="text-muted" style={{ fontSize: 12, marginBottom: 16 }}>Wait for a family member to message you, or start a private thread with "New DM" above.</div>
        </div>
      )}

      {threads.length > 0 && (
        <div style={{ display: 'grid', gridTemplateColumns: 'minmax(220px, 280px) 1fr', gap: 16, minHeight: 480 }}>
          {/* Thread list */}
          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
            {threads.map(t => {
              const last = t.messages[t.messages.length - 1];
              const friendlyName = labelFor(t.thread_for);
              const author = last?.author_name || friendlyName;
              const isActive = t.thread_for === activeThread;
              const fromUser = last && last.author_code === t.thread_for; // last message came from the user (not Milburn)
              const isEmpty = t.messages.length === 0;
              return (
                <button key={t.thread_for} onClick={() => setActiveThread(t.thread_for)}
                  style={{ display: 'block', width: '100%', textAlign: 'left', padding: '14px 16px', background: isActive ? 'rgba(243,156,18,0.12)' : 'transparent', border: 'none', borderBottom: '1px solid rgba(73,72,71,0.06)', cursor: 'pointer', transition: 'background 0.15s' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ width: 36, height: 36, flexShrink: 0, borderRadius: 'var(--radius-lg)', background: 'rgba(243,156,18,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      <span style={{ fontSize: 16 }}>{fromUser ? '💬' : '🎩'}</span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
                        <span style={{ fontFamily: 'var(--font-headline)', fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{friendlyName}</span>
                        <span style={{ fontSize: 10, color: 'var(--outline)', flexShrink: 0 }}>{isEmpty ? 'new' : formatTime(t.last_at)}</span>
                      </div>
                      <div className="text-muted" style={{ fontSize: 11, marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                        {isEmpty ? <span style={{ fontStyle: 'italic', opacity: 0.7 }}>No messages yet {'\u2014'} say hi</span> : <><span style={{ opacity: 0.7 }}>{author}:</span> {last?.content || ''}</>}
                      </div>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>

          {/* Active thread view */}
          <div className="card" style={{ padding: 0, display: 'flex', flexDirection: 'column' }}>
            {!current && (
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 40 }}>
                <span className="text-muted" style={{ fontSize: 13 }}>Select a thread to view messages.</span>
              </div>
            )}
            {current && (
              <>
                <div style={{ padding: '14px 20px', borderBottom: '1px solid rgba(73,72,71,0.08)', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 36, height: 36, borderRadius: 'var(--radius-lg)', background: 'rgba(243,156,18,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <span style={{ fontSize: 16 }}>🎩</span>
                  </div>
                  <div>
                    <div style={{ fontFamily: 'var(--font-headline)', fontSize: 14, fontWeight: 700 }}>{labelFor(current.thread_for)}</div>
                    <div className="text-muted" style={{ fontSize: 11 }}>{current.messages.length} message{current.messages.length === 1 ? '' : 's'} {'\u00B7'} private DM</div>
                  </div>
                </div>
                <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px', maxHeight: 480 }}>
                  {current.messages.map(m => {
                    const isMilburn = m.author_code !== current.thread_for;
                    return (
                      <div key={m.id} style={{ display: 'flex', flexDirection: 'column', alignItems: isMilburn ? 'flex-end' : 'flex-start', marginBottom: 12 }}>
                        <div style={{ fontSize: 10, color: 'var(--outline)', marginBottom: 2, fontFamily: 'var(--font-headline)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
                          {isMilburn ? '🎩 ' : ''}{m.author_name} {'\u00B7'} {formatTime(m.created_at)}
                        </div>
                        <div style={{ maxWidth: '80%', padding: '10px 14px', borderRadius: 'var(--radius-xl)', background: isMilburn ? 'rgba(243,156,18,0.12)' : 'var(--surface-container-highest)', fontSize: 13, lineHeight: 1.5, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
                          {m.content}
                        </div>
                      </div>
                    );
                  })}
                  <div ref={endRef} />
                </div>
                <div style={{ padding: '12px 16px', borderTop: '1px solid rgba(73,72,71,0.08)', display: 'flex', gap: 8 }}>
                  <input className="input-field" style={{ flex: 1 }} placeholder={current.messages.length === 0 ? `Say hi to ${labelFor(current.thread_for)} as Milburn...` : `Reply to ${labelFor(current.thread_for)} as Milburn...`} value={reply} onChange={e => setReply(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); } }} disabled={sending} />
                  <button className="btn btn-primary" onClick={sendReply} disabled={sending || !reply.trim()} style={{ flexShrink: 0 }}>
                    <Icon name="send" size={16} /> {sending ? 'Sending' : 'Reply'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

            <div className="stat-card"><p className="stat-label">Pages</p><p className="stat-value" style={{ fontSize: 24 }}>12</p><p className="text-muted" style={{ fontSize: 11 }}>Including admin + detail</p></div>
            <div className="stat-card"><p className="stat-label">Lessons</p><p className="stat-value" style={{ fontSize: 24 }}>12</p><p className="text-muted" style={{ fontSize: 11 }}>11 stock + 1 crypto</p></div>
            <div className="stat-card"><p className="stat-label">Skills</p><p className="stat-value" style={{ fontSize: 24 }}>5</p><p className="text-muted" style={{ fontSize: 11 }}>Lessons, Reports, Leaderboard, Analyzer, App</p></div>

}

// ==================== LEADERBOARD PAGE ====================
function LeaderboardPage({ players, user, achievementsUnlocked }) {
  // Empty-state guard -- the leaderboard fetch is async and may not have
  // returned yet (or there are no active users for some reason).
  if (!players || players.length === 0) {
    return (
      <div>
        <div style={{ marginBottom: 32 }}>
          <h1 style={{ fontFamily: 'var(--font-headline)', fontSize: 'clamp(28px, 4vw, 44px)', fontWeight: 700, letterSpacing: '-0.03em', marginBottom: 8 }}>Leaderboard</h1>
          <p className="text-muted" style={{ fontSize: 16 }}>See how you stack up against the squad. Trade smart, climb the ranks.</p>
        </div>
        <div className="card" style={{ padding: 48, textAlign: 'center' }}>
          <div className="stat-icon primary" style={{ width: 56, height: 56, margin: '0 auto 16px' }}><Icon name="group" size={28} /></div>
          <div style={{ fontFamily: 'var(--font-headline)', fontSize: 18, fontWeight: 700, marginBottom: 6 }}>Loading squad...</div>
          <p className="text-muted" style={{ fontSize: 14 }}>Pulling live portfolios from the server.</p>
        </div>
      </div>
    );
  }

  // Performance history graph -- cosmetic projection of each player's gainPct
  // over a synthetic 30-day window. Real per-day history will replace this
  // once we snapshot portfolios daily.
  const perfHistory = players.map(p => {
    const member = getSquadMember(p.name);
    const points = [];
    let val = 100000;
    for (let d = 30; d >= 0; d--) {
      const dailyReturn = (p.gainPct / 30) + (Math.sin(d * 0.5 + (p.name || '').length) * 0.3);
      val += val * (dailyReturn / 100);
      points.push({ day: 30 - d, value: val });
    }
    return { name: p.name, color: member.color, points, final: val };
  });

  // Learning insights -- each one is guarded so an empty / zero-trade squad
  // doesn't produce nonsense like "Best trade: -- +0%".
  const insights = [];
  const activeTraders = players.filter(p => p.trades > 0);
  const withPositions = players.filter(p => p.holdings > 0);

  if (activeTraders.length === 0) {
    insights.push({ icon: 'school', title: 'Fresh Start', text: "The squad is just getting started. Every pro investor began with zero trades. Pick a stock you believe in, make a small first move, and track what happens -- the best learning comes from doing." });
  } else {
    const winner = activeTraders[0];
    if (winner.winRate > 60 && winner.holdings > 0) {
      insights.push({ icon: 'psychology', title: 'High Win Rate Wins', text: winner.name + " leads with a " + winner.winRate + "% win rate. Most of their positions are in the green. The lesson: it is not about making huge gains on every trade -- it is about being right more often than wrong." });
    }
    if (winner.holdings > 2) {
      insights.push({ icon: 'balance', title: 'Diversification Pays Off', text: winner.name + " holds " + winner.holdings + " different assets. Spreading money across multiple investments reduces risk. When one goes down, others can go up." });
    }
    if (withPositions.length > 0) {
      const bestTrader = [...withPositions].sort((a, b) => b.bestTrade.returnPct - a.bestTrade.returnPct)[0];
      if (bestTrader && bestTrader.bestTrade.returnPct > 0) {
        insights.push({ icon: 'trending_up', title: 'Best Current Position', text: bestTrader.name + "'s top holding is " + bestTrader.bestTrade.symbol + " at +" + bestTrader.bestTrade.returnPct.toFixed(0) + "%. Finding strong companies in growing sectors is how you find big winners." });
      }
      const worstMove = [...withPositions].sort((a, b) => a.worstTrade.returnPct - b.worstTrade.returnPct)[0];
      if (worstMove && worstMove.worstTrade.returnPct < 0) {
        insights.push({ icon: 'shield', title: 'Learn From Losses', text: worstMove.name + "'s weakest position is " + worstMove.worstTrade.symbol + " at " + worstMove.worstTrade.returnPct.toFixed(0) + "%. Losses are part of investing. The key is keeping them small and learning from them. Never risk more than you can afford to lose." });
      }
    }
    if (activeTraders.length >= 2) {
      const mostActive = [...activeTraders].sort((a, b) => b.trades - a.trades)[0];
      const leastActive = [...activeTraders].sort((a, b) => a.trades - b.trades)[0];
      if (mostActive.code !== leastActive.code && mostActive.gainPct < leastActive.gainPct && leastActive.gainPct > 0) {
        insights.push({ icon: 'hourglass_top', title: 'Patience Over Activity', text: leastActive.name + " made fewer trades (" + leastActive.trades + ") but has better returns than " + mostActive.name + " (" + mostActive.trades + " trades). More trading does not always mean more profit. Sometimes doing less is more." });
      } else {
        insights.push({ icon: 'bolt', title: 'Active Trading', text: mostActive.name + " leads with " + mostActive.trades + " trades. Being active can work if you have a strategy, but watch out for overtrading -- every trade has risk." });
      }
    }
    if (insights.length === 0) {
      insights.push({ icon: 'school', title: 'Early Days', text: "The squad is warming up. As more trades happen, this section will fill with patterns about who is winning, what is working, and where losses are teaching lessons." });
    }
  }

  return (
    <div>
      <div style={{ marginBottom: 32 }}>
        <h1 style={{ fontFamily: 'var(--font-headline)', fontSize: 'clamp(28px, 4vw, 44px)', fontWeight: 700, letterSpacing: '-0.03em', marginBottom: 8 }}>Leaderboard</h1>
        <p className="text-muted" style={{ fontSize: 16 }}>See how you stack up against the squad. Trade smart, climb the ranks.</p>
      </div>

      <LeaderboardSection players={players} user={user} />

      {/* Performance Graph */}
      <h3 className="section-title" style={{ marginTop: 48, marginBottom: 24 }}><Icon name="show_chart" size={20} /> Performance Over Time</h3>
      <div className="card" style={{ padding: 32 }}>
        <div style={{ display: 'flex', gap: 16, marginBottom: 16, flexWrap: 'wrap' }}>
          {perfHistory.map(p => (
            <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div style={{ width: 12, height: 3, borderRadius: 2, background: p.color }}></div>
              <span style={{ fontFamily: 'var(--font-headline)', fontSize: 11, fontWeight: 600 }}>{p.name}</span>
            </div>
          ))}
        </div>
        <div style={{ position: 'relative', height: 280 }}>
          <svg viewBox="0 0 600 280" style={{ width: '100%', height: '100%' }} preserveAspectRatio="none">
            {/* Grid lines */}
            {[0, 1, 2, 3, 4].map(i => (
              <line key={i} x1="0" y1={i * 70} x2="600" y2={i * 70} stroke="rgba(73,72,71,0.1)" strokeWidth="1" />
            ))}
            {/* Player lines */}
            {perfHistory.map(p => {
              const minVal = 90000;
              const maxVal = 130000;
              const range = maxVal - minVal;
              const pts = p.points.map((pt, i) => {
                const x = (i / 30) * 600;
                const y = 280 - ((pt.value - minVal) / range) * 280;
                return x + ',' + y;
              }).join(' ');
              return <polyline key={p.name} fill="none" stroke={p.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" points={pts} opacity="0.8" />;
            })}
            {/* End dots */}
            {perfHistory.map(p => {
              const minVal = 90000;
              const maxVal = 130000;
              const range = maxVal - minVal;
              const last = p.points[p.points.length - 1];
              const x = 600;
              const y = 280 - ((last.value - minVal) / range) * 280;
              return <circle key={p.name} cx={x} cy={y} r="4" fill={p.color} />;
            })}
          </svg>
          {/* Y-axis labels */}
          <div style={{ position: 'absolute', top: 0, right: 8, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', height: '100%', pointerEvents: 'none' }}>
            {['$130K', '$120K', '$110K', '$100K', '$90K'].map(l => (
              <span key={l} className="label-system" style={{ fontSize: 9 }}>{l}</span>
            ))}
          </div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8 }}>
          <span className="label-system" style={{ fontSize: 9 }}>30 Days Ago</span>
          <span className="label-system" style={{ fontSize: 9 }}>Today</span>
        </div>
      </div>

      {/* Player Cards */}
      <h3 className="section-title" style={{ marginTop: 48, marginBottom: 24 }}><Icon name="group" size={20} /> Player Breakdown</h3>
      <div className="stats-grid" style={{ gridTemplateColumns: 'repeat(2, 1fr)' }}>
        {players.map(p => {
          return (
            <div key={p.code || p.name} className="card" style={{ border: p.isYou ? '1px solid rgba(0,255,163,0.2)' : undefined }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
                <CharacterAvatar name={p.name} size={56} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: 'var(--font-headline)', fontSize: 18, fontWeight: 700, color: p.isYou ? 'var(--primary-fixed)' : 'var(--on-surface)' }}>{p.name}{p.isYou ? ' (You)' : ''}</div>
                  <div className="stock-name-text">{strategyFor(p)}</div>

                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontFamily: 'var(--font-headline)', fontSize: 24, fontWeight: 900, color: p.gain >= 0 ? 'var(--primary-fixed)' : 'var(--error)' }}>{p.gain >= 0 ? '+' : ''}{p.gainPct.toFixed(1)}%</div>
                  <div className="text-muted" style={{ fontSize: 12 }}>{formatCurrency(p.totalValue)}</div>

                  </div>

                    <div className="label-system" style={{ fontSize: 9, marginBottom: 4, color: 'var(--error)' }}>Worst Move</div>

// ==================== NOTIFICATION ====================
function Notification({ notification, onClose }) {
  useEffect(() => { if (notification) { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); } }, [notification]);
  if (!notification) return null;
  return <div className={`notification notification-${notification.type}`}><Icon name={notification.type === 'success' ? 'check_circle' : 'error'} size={18} /> {notification.message}</div>;
}

// ==================== MAIN APP ====================
function App() {
  // Restore session from localStorage -- Mobile users should not have to re-enter
  // their access code on every visit. Session stays valid for 30 days.
  const restoredAuth = (() => {
    try {
      const raw = localStorage.getItem('stockrocket_auth');
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const age = Date.now() - (parsed.loginAt || 0);
      if (age > 30 * 86400 * 1000) return null; // 30-day session window
      return parsed;
    } catch { return null; }
  })();
  const [isLoggedIn, setIsLoggedIn] = useState(!!restoredAuth);
  const [user, setUser] = useState(restoredAuth?.name || '');
  const [displayName, setDisplayName] = useState(restoredAuth?.displayName || restoredAuth?.name || '');
  const [tier, setTier] = useState(restoredAuth?.tier || 'free');
  const [accessCode, setAccessCode] = useState(restoredAuth?.code || '');
  const [activePage, setActivePage] = useState('dashboard');
  const [notification, setNotification] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // Live data hook -- fetches from CoinGecko + Finnhub proxy
  const { stocks, crypto, isLive, stocksLive, cryptoLive, marketOpen, lastUpdated, refresh } = useLiveData();

  // Portfolio: server (Supabase via /api/trades) is the source of truth.
  // localStorage is a fast-paint cache only -- we load it synchronously for
  // instant render, then refresh from the server as soon as we have a code.
  const defaultPortfolio = {
    cash: 100000,
    holdings: [],
    trades: [],
  };
  const [portfolio, setPortfolio] = useState(() => {
    try {
      const saved = localStorage.getItem('stockrocket_portfolio');
      return saved ? JSON.parse(saved) : defaultPortfolio;
    } catch { return defaultPortfolio; }
  });
  const [portfolioLoaded, setPortfolioLoaded] = useState(false);

  // Save portfolio to localStorage whenever it changes (cache for next fast paint)
  useEffect(() => {
    try { localStorage.setItem('stockrocket_portfolio', JSON.stringify(portfolio)); } catch {}
  }, [portfolio]);

  // On login (or when live prices first arrive), refresh portfolio from server.
  // Hydrate with live stock/crypto prices so UI shows accurate value/gain/return.
  useEffect(() => {
    if (!accessCode) return;
    let cancelled = false;
    (async () => {
      const data = await fetchServerPortfolio(accessCode);
      if (cancelled || !data) return;
      const hydrated = hydrateServerPortfolio(data.portfolio, data.trades, stocks, crypto);
      setPortfolio(hydrated);
      setPortfolioLoaded(true);
    })();
    return () => { cancelled = true; };
  }, [accessCode, isLive]); // isLive flips when live prices arrive -- triggers re-hydrate with real prices

  // Save user session
  useEffect(() => {
    if (user) try { localStorage.setItem('stockrocket_user', user); } catch {}
  }, [user]);

  // Update portfolio holdings with live prices when they change
  useEffect(() => {
    if (!isLive) return;
    setPortfolio(prev => {
      const updated = prev.holdings.map(h => {
        const liveStock = stocks.find(s => s.symbol === h.symbol);
        if (!liveStock) return h;
        const newValue = h.shares * liveStock.price;
        const newGain = (liveStock.price - h.avgCost) * h.shares;
        return { ...h, currentPrice: liveStock.price, value: newValue, gain: newGain, returnPercent: ((liveStock.price - h.avgCost) / h.avgCost) * 100 };
      });
      return { ...prev, holdings: updated };
    });
  }, [stocks, isLive]);

  const [isAdmin, setIsAdmin] = useState(!!restoredAuth?.isAdmin);
  const [stockDetail, setStockDetail] = useState(null); // symbol for stock detail page

  // Logout clears session + returns to login screen
  const handleLogout = useCallback(() => {
    try { localStorage.removeItem('stockrocket_auth'); } catch {}
    setIsLoggedIn(false);
    setUser('');
    setDisplayName('');
    setIsAdmin(false);
    setTier('free');
    setAccessCode('');
    setActivePage('dashboard');
  }, []);

  // Achievements + Leaderboard
  const { unlocked: achievementsUnlocked, newAchievement, total: achievementsTotal } = useAchievements(portfolio);
  const leaderboard = useLeaderboard(accessCode, stocks, crypto);

  // Milburn inbox unread counter -- only meaningful for admin.
  // Polls /api/messages every 15s. Counts messages newer than `stockrocket_milburn_seen_at`
  // that came from someone other than the admin. Clearing happens when admin opens Chat -> Ask Milburn.
  const [milburnUnread, setMilburnUnread] = useState(0);
  useEffect(() => {
    if (!isAdmin || !accessCode) { setMilburnUnread(0); return; }
    let mounted = true;
    const poll = async () => {
      try {
        const res = await fetch(`${API_BASE}/api/messages?channel=milburn&admin=1`, { headers: { 'X-User-Code': accessCode } });
        const data = await res.json();
        if (!mounted || !data.ok) return;
        const seen = Number(localStorage.getItem('stockrocket_milburn_seen_at') || 0);
        let count = 0;
        for (const t of (data.threads || [])) {
          for (const m of (t.messages || [])) {
            const at = new Date(m.created_at).getTime();
            if (m.author_code !== accessCode && at > seen) count++;
          }
        }
        setMilburnUnread(count);
      } catch {}
    };
    poll();
    const iv = setInterval(poll, 15000);
    return () => { mounted = false; clearInterval(iv); };
  }, [isAdmin, accessCode]);

  // When admin visits the Chat page and is on Milburn channel, mark as read.
  // We just bump the seen timestamp whenever they land on 'chat' page -- good enough for v1.
  useEffect(() => {
    if (!isAdmin) return;
    if (activePage === 'chat') {
      try { localStorage.setItem('stockrocket_milburn_seen_at', String(Date.now())); } catch {}
      setMilburnUnread(0);
    }
  }, [activePage, isAdmin]);

  const handleLogin = (payload) => {
    const resolvedDisplay = payload.label || payload.name;
    setUser(payload.name);
    setDisplayName(resolvedDisplay);
    setIsAdmin(!!payload.isAdmin);
    setTier(payload.tier || 'free');
    setAccessCode(payload.code || '');
    setIsLoggedIn(true);
    try {
      localStorage.setItem('stockrocket_auth', JSON.stringify({
        name: payload.name, displayName: resolvedDisplay, tier: payload.tier, isAdmin: payload.isAdmin, code: payload.code, loginAt: Date.now()
      }));
    } catch {}
  };

  if (!isLoggedIn) return <LoginPage onLogin={handleLogin} />;

  // Stock detail page (overlay -- any page can navigate here)
  if (stockDetail) {
    return (
      <div className="app-layout">
        <Header activePage={activePage} setActivePage={(p) => { setStockDetail(null); setActivePage(p); }} user={user} onMenuToggle={() => setSidebarOpen(!sidebarOpen)} />
        {sidebarOpen && <div className="sidebar-overlay visible" onClick={() => setSidebarOpen(false)} />}
        <Sidebar activePage={activePage} setActivePage={(p) => { setStockDetail(null); setActivePage(p); }} user={user} onClose={() => setSidebarOpen(false)} className={sidebarOpen ? 'mobile-open' : ''} isAdmin={isAdmin} tier={tier} onLogout={handleLogout} milburnUnread={milburnUnread} />
        <main className="main-content"><div className="main-inner">
          <StockDetailPage symbol={stockDetail} stocks={stocks} crypto={crypto} portfolio={portfolio} setPortfolio={setPortfolio} setNotification={setNotification} onBack={() => setStockDetail(null)} user={user} code={accessCode} />
        </div></main>
        <Notification notification={notification} onClose={() => setNotification(null)} />
        <AchievementToast achievement={newAchievement} />
      </div>
    );
  }

  const renderPage = () => {
    switch (activePage) {
      case 'dashboard': return <DashboardPage portfolio={portfolio} stocks={stocks} crypto={crypto} user={user} setStockDetail={setStockDetail} achievementsUnlocked={achievementsUnlocked} achievementsTotal={achievementsTotal} leaderboard={leaderboard} />;
      case 'portfolio': return <PortfolioPage portfolio={portfolio} user={user} stocks={stocks} setStockDetail={setStockDetail} />;
      case 'trade': return <TradePage stocks={stocks} crypto={crypto} portfolio={portfolio} setPortfolio={setPortfolio} setNotification={setNotification} user={user} code={accessCode} />;
      case 'market': return <MarketsPage stocks={stocks} setStockDetail={setStockDetail} />;
      case 'crypto': return <CryptoPage crypto={crypto} stocks={stocks} portfolio={portfolio} setPortfolio={setPortfolio} setNotification={setNotification} user={user} code={accessCode} />;
      case 'leaderboard': return <LeaderboardPage players={leaderboard} user={user} achievementsUnlocked={achievementsUnlocked} />;
      case 'chat': return <ChatPage user={user} displayName={displayName} code={accessCode} isAdmin={isAdmin} />;
      case 'report': return <WeeklyReportPage setStockDetail={setStockDetail} />;
      case 'insights': return <InsightsPage />;
      case 'learn': return <LearnPage />;
      case 'admin': return isAdmin ? <AdminPage portfolio={portfolio} stocks={stocks} crypto={crypto} setNotification={setNotification} user={user} adminCode={accessCode} /> : <DashboardPage portfolio={portfolio} stocks={stocks} crypto={crypto} user={user} />;
      default: return <DashboardPage portfolio={portfolio} stocks={stocks} crypto={crypto} user={user} />;
    }
  };

  return (
    <div className="app-layout">
      <Header activePage={activePage} setActivePage={setActivePage} user={user} onMenuToggle={() => setSidebarOpen(!sidebarOpen)} />
      {sidebarOpen && <div className="sidebar-overlay visible" onClick={() => setSidebarOpen(false)} />}
      <Sidebar activePage={activePage} setActivePage={setActivePage} user={user} onClose={() => setSidebarOpen(false)} className={sidebarOpen ? 'mobile-open' : ''} isAdmin={isAdmin} tier={tier} onLogout={handleLogout} milburnUnread={milburnUnread} />
      <main className="main-content">
        <div className="main-inner">
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 8, gap: 12, flexWrap: 'wrap' }}>
            {!marketOpen && <span className="text-muted" style={{ fontSize: 10, fontFamily: 'var(--font-label)', letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6, color: 'var(--on-surface-variant)' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--outline-variant)', display: 'inline-block' }}></span>
              STOCKS CLOSED -- LAST CLOSE
            </span>}
            {marketOpen && stocksLive && <span className="text-muted" style={{ fontSize: 10, fontFamily: 'var(--font-label)', letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6 }}>
              <span className="pulse-dot"></span> STOCKS LIVE
            </span>}
            {marketOpen && !stocksLive && <span className="text-muted" style={{ fontSize: 10, fontFamily: 'var(--font-label)', letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6, color: 'var(--error, #ff716c)' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'currentColor', display: 'inline-block' }}></span>
              STOCK FEED UNAVAILABLE
            </span>}
            {cryptoLive && <span className="text-muted" style={{ fontSize: 10, fontFamily: 'var(--font-label)', letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: 6 }}>
              <span className="pulse-dot"></span> CRYPTO LIVE
            </span>}
            {lastUpdated && <span className="text-muted" style={{ fontSize: 10, fontFamily: 'var(--font-label)', letterSpacing: '0.1em' }}>
              UPDATED {lastUpdated.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}
            </span>}
          </div>
          {renderPage()}
        </div>
      </main>
      <Notification notification={notification} onClose={() => setNotification(null)} />
      <AchievementToast achievement={newAchievement} />
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  console.log('StockRocket rendered successfully');
} catch (e) {
  console.error('RENDER ERROR:', e);
  document.getElementById('root').innerHTML = '<div style="color:#ff716c;padding:40px;font-family:monospace;background:#0e0e0e;min-height:100vh"><h2>StockRocket Error</h2><pre>' + e.message + '\n\n' + e.stack + '</pre></div>';
}

  </script>
  <script>
    // Catch any Babel compilation errors
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.message, e.filename, e.lineno);
      var root = document.getElementById('root');
      if (root && (!root.children.length || root.children[0]?.tagName === 'DIV')) {
        root.innerHTML = '<div style="color:#ff716c;padding:40px;font-family:monospace;background:#0e0e0e;min-height:100vh"><h2>StockRocket Error</h2><p>' + e.message + '</p><p>Line: ' + e.lineno + '</p></div>';
      }
    });
  </script>
</body>
</html>
